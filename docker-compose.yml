version: "3.9"

services:
  web:
    build: .
    container_name: sentinel-web
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      SOCKETIO_ASYNC_MODE: eventlet
      GUNICORN_WORKER_CLASS: eventlet
    depends_on:
      - db
    expose:
      - "5000"
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: sentinel-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: secure_panel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: sentinel-nginx
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mysql_data:

