<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel | Secure Messaging Workspace</title>
<meta name="csrf-token" content="{{ csrf_token() }}">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root {
    color-scheme: light;
    --page: #f5f7f8;
    --surface: rgba(255, 255, 255, 0.9);
    --surface-strong: #ffffff;
    --surface-muted: rgba(244, 248, 250, 0.88);
    --text: #12202a;
    --muted: #60717b;
    --line: rgba(18, 32, 42, 0.12);
    --line-strong: rgba(18, 32, 42, 0.2);
    --accent: #12b7d5;
    --accent-strong: #0891b2;
    --accent-ink: #042431;
    --accent-soft: rgba(18, 183, 213, 0.1);
    --danger: #dc2626;
    --danger-soft: rgba(220, 38, 38, 0.09);
    --success: #0f9d58;
    --success-soft: rgba(15, 157, 88, 0.1);
    --shadow-lg: 0 36px 100px rgba(17, 32, 43, 0.12);
    --shadow-md: 0 18px 44px rgba(17, 32, 43, 0.08);
}
[data-theme="dark"] {
    color-scheme: dark;
    --page: #071219;
    --surface: rgba(12, 24, 33, 0.86);
    --surface-strong: #0e1c25;
    --surface-muted: rgba(9, 20, 29, 0.92);
    --text: #f5fbff;
    --muted: #90a5b2;
    --line: rgba(191, 228, 240, 0.12);
    --line-strong: rgba(191, 228, 240, 0.22);
    --accent: #34d6f7;
    --accent-strong: #67e8f9;
    --accent-ink: #06202b;
    --accent-soft: rgba(52, 214, 247, 0.14);
    --danger: #fb7185;
    --danger-soft: rgba(251, 113, 133, 0.12);
    --success: #5eead4;
    --success-soft: rgba(94, 234, 212, 0.12);
    --shadow-lg: 0 40px 110px rgba(2, 6, 10, 0.45);
    --shadow-md: 0 22px 50px rgba(2, 6, 10, 0.28);
}
* {
    box-sizing: border-box;
}
html, body {
    margin: 0;
    min-height: 100%;
}
body {
    font-family: "Satoshi", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(18, 183, 213, 0.18), transparent 26rem),
        radial-gradient(circle at bottom right, rgba(8, 145, 178, 0.12), transparent 24rem),
        linear-gradient(180deg, #fbfcfc 0%, var(--page) 58%);
}
[data-theme="dark"] body {
    background:
        radial-gradient(circle at top left, rgba(52, 214, 247, 0.16), transparent 24rem),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.18), transparent 20rem),
        linear-gradient(180deg, #061017 0%, var(--page) 60%);
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(18, 32, 42, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 32, 42, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 92%);
}
.shell {
    position: relative;
    width: min(1180px, calc(100vw - 32px));
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 0 48px;
}
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 40px;
}
.brand {
    display: flex;
    align-items: center;
    gap: 16px;
}
.brand-mark {
    display: grid;
    place-items: center;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: #042431;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    box-shadow: 0 18px 38px rgba(18, 183, 213, 0.22);
}
.brand-meta strong,
.eyebrow,
.metric-label,
.panel-label,
.field-label,
.chip {
    letter-spacing: 0.16em;
    text-transform: uppercase;
}
.brand-meta strong {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
}
.brand-title {
    margin: 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
}
.topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.surface {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
}
.layout {
    display: grid;
    gap: 32px;
    grid-template-columns: minmax(0, 1.02fr) minmax(0, 0.98fr);
    align-items: start;
}
.hero {
    padding: 40px;
}
.eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    font-size: 0.74rem;
    font-weight: 800;
}
.hero h1 {
    margin: 24px 0 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: clamp(3rem, 5vw, 5.5rem);
    line-height: 0.94;
    letter-spacing: -0.06em;
}
.accent-text {
    color: var(--accent-strong);
}
.hero-copy {
    margin: 24px 0 0;
    max-width: 540px;
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--muted);
}
.hero-grid {
    display: grid;
    gap: 16px;
    margin-top: 32px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
}
.metric-card {
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.52);
    box-shadow: var(--shadow-md);
}
[data-theme="dark"] .metric-card {
    background: rgba(255, 255, 255, 0.03);
}
.metric-label {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--muted);
}
.metric-value {
    margin-top: 12px;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
}
.metric-copy {
    margin-top: 8px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 0.95rem;
}
.panel {
    padding: 24px;
}
.panel-label {
    margin: 0;
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--muted);
}
.panel-title {
    margin: 10px 0 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 2rem;
    line-height: 1.04;
    letter-spacing: -0.04em;
}
.panel-copy {
    margin: 16px 0 0;
    color: var(--muted);
    line-height: 1.7;
}
.segmented {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid var(--line);
    border-radius: 20px;
}
[data-theme="dark"] .segmented {
    background: rgba(255, 255, 255, 0.04);
}
.segmented button,
.button {
    border: 0;
    cursor: pointer;
    font: inherit;
    transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}
.segmented button {
    min-height: 52px;
    border-radius: 16px;
    font-weight: 800;
    color: var(--muted);
    background: transparent;
}
.segmented button.active {
    background: var(--surface-strong);
    color: var(--text);
    box-shadow: var(--shadow-md);
}
.stack {
    display: grid;
    gap: 16px;
    margin-top: 20px;
}
.field {
    display: grid;
    gap: 8px;
}
.field-label {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
}
.input-shell {
    position: relative;
}
.input,
.search-input,
.composer-textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--text);
    font: inherit;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}
[data-theme="dark"] .input,
[data-theme="dark"] .search-input,
[data-theme="dark"] .composer-textarea {
    background: rgba(255, 255, 255, 0.04);
}
.input,
.search-input {
    min-height: 56px;
    padding: 0 18px;
}
.input:focus,
.search-input:focus,
.composer-textarea:focus,
.icon-button:focus,
.button:focus,
.segmented button:focus,
.action-link:focus {
    outline: none;
    border-color: var(--accent-strong);
    box-shadow: 0 0 0 4px rgba(18, 183, 213, 0.18);
}
.input[type="password"]::-ms-reveal,
.input[type="password"]::-ms-clear {
    display: none;
}
.password-toggle {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
}
.password-toggle:hover,
.icon-button:hover,
.button:hover,
.action-link:hover {
    transform: translateY(-1px);
}
.password-toggle:hover,
.icon-button:hover {
    border-color: var(--line);
    background: rgba(255, 255, 255, 0.2);
    color: var(--text);
}
.button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 52px;
    padding: 0 20px;
    border-radius: 16px;
    border: 1px solid transparent;
    font-weight: 800;
    text-decoration: none;
}
.button-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: #042431;
    box-shadow: 0 22px 40px rgba(18, 183, 213, 0.22);
}
.button-secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--line);
}
.button-quiet {
    min-height: 44px;
    padding: 0 16px;
    background: transparent;
    color: var(--muted);
    border-color: var(--line);
}
.button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
.form-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
}
.helper-text,
.status-text,
.empty-state,
.message-meta,
.security-list li,
.restriction-list li {
    color: var(--muted);
}
.inline-alert {
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 0.95rem;
    line-height: 1.6;
}
.inline-alert.error {
    border-color: rgba(220, 38, 38, 0.16);
    background: var(--danger-soft);
    color: var(--danger);
}
.inline-alert.success {
    border-color: rgba(15, 157, 88, 0.16);
    background: var(--success-soft);
    color: var(--success);
}
.notice {
    margin-top: 20px;
}
.spinner {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 2px solid rgba(4, 36, 49, 0.2);
    border-top-color: rgba(4, 36, 49, 0.82);
    animation: spin 0.85s linear infinite;
}
.security-list,
.restriction-list {
    display: grid;
    gap: 12px;
    padding: 0;
    margin: 24px 0 0;
    list-style: none;
}
.security-list li,
.restriction-list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.6;
}
.dot {
    width: 10px;
    height: 10px;
    margin-top: 8px;
    border-radius: 999px;
    background: var(--accent-strong);
    flex: 0 0 auto;
}
.workspace {
    display: grid;
    gap: 20px;
}
.workspace-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
}
.workspace-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 0.72rem;
    font-weight: 800;
}
.chip-good {
    background: var(--success-soft);
    color: var(--success);
}
.chip-neutral {
    background: rgba(255, 255, 255, 0.08);
}
.search-row {
    display: flex;
    gap: 12px;
}
.messages {
    min-height: 360px;
    max-height: 460px;
    overflow: auto;
    padding-right: 4px;
    display: grid;
    gap: 14px;
}
.message-row {
    display: flex;
    justify-content: flex-start;
}
.message-row.mine {
    justify-content: flex-end;
}
.message-card {
    max-width: min(100%, 520px);
    padding: 14px 16px;
    border-radius: 22px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.62);
    box-shadow: var(--shadow-md);
}
[data-theme="dark"] .message-card {
    background: rgba(255, 255, 255, 0.05);
}
.message-row.mine .message-card {
    background: linear-gradient(135deg, rgba(18, 183, 213, 0.16) 0%, rgba(8, 145, 178, 0.2) 100%);
    border-color: rgba(18, 183, 213, 0.24);
}
.message-user {
    font-size: 0.82rem;
    font-weight: 800;
}
.message-text {
    margin: 8px 0 0;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
}
.message-meta {
    margin-top: 8px;
    font-size: 0.84rem;
}
.composer {
    padding-top: 4px;
}
.composer-form {
    display: grid;
    gap: 12px;
}
.composer-textarea {
    min-height: 120px;
    padding: 16px 18px;
    resize: vertical;
}
.status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}
.typing-indicator {
    font-size: 0.94rem;
    color: var(--muted);
}
.shell-chat {
    width: min(1440px, calc(100vw - 32px));
    padding-bottom: 32px;
}
.chat-frame {
    display: grid;
    gap: 24px;
    grid-template-columns: 320px minmax(0, 1fr);
    align-items: stretch;
}
.chat-sidebar,
.chat-stage {
    min-height: calc(100vh - 56px);
}
.chat-sidebar {
    display: grid;
    grid-template-rows: auto auto auto minmax(0, 1fr) auto;
    gap: 20px;
    padding: 24px;
    background:
        radial-gradient(circle at top right, rgba(18, 183, 213, 0.12), transparent 10rem),
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), var(--surface-muted));
}
[data-theme="dark"] .chat-sidebar {
    background:
        radial-gradient(circle at top right, rgba(52, 214, 247, 0.12), transparent 10rem),
        linear-gradient(180deg, rgba(13, 24, 33, 0.96), rgba(7, 16, 23, 0.9));
}
.chat-stage {
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr) auto auto;
    padding: 0;
    overflow: hidden;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 250, 252, 0.86));
}
[data-theme="dark"] .chat-stage {
    background:
        linear-gradient(180deg, rgba(14, 28, 37, 0.94), rgba(8, 18, 25, 0.92));
}
.chat-brand {
    display: flex;
    align-items: center;
    gap: 14px;
}
.chat-brand-copy {
    display: grid;
    gap: 4px;
}
.chat-kicker,
.sidebar-label,
.conversation-kicker,
.date-divider {
    letter-spacing: 0.16em;
    text-transform: uppercase;
}
.chat-kicker,
.sidebar-label,
.conversation-kicker {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
}
.chat-sidebar-title {
    margin: 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.42rem;
    line-height: 1;
}
.chat-sidebar-copy,
.sidebar-copy,
.participant-copy,
.room-copy,
.search-summary,
.composer-hint,
.composer-count {
    color: var(--muted);
}
.chat-user-card,
.sidebar-card,
.participant-row,
.composer-card {
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
}
.chat-user-card {
    display: grid;
    gap: 14px;
    padding: 18px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.62);
}
[data-theme="dark"] .chat-user-card {
    background: rgba(255, 255, 255, 0.03);
}
.chat-user-head {
    display: flex;
    align-items: center;
    gap: 14px;
}
.avatar-badge,
.participant-avatar {
    display: grid;
    place-items: center;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: var(--accent-ink);
    font-family: "Cabinet Grotesk", sans-serif;
    font-weight: 800;
}
.avatar-badge {
    width: 52px;
    height: 52px;
    font-size: 1.15rem;
}
.participant-avatar {
    width: 40px;
    height: 40px;
    font-size: 0.95rem;
}
.chat-user-name,
.participant-name {
    margin: 0;
    font-size: 1rem;
    font-weight: 800;
}
.chat-user-copy {
    margin: 4px 0 0;
    color: var(--muted);
    line-height: 1.5;
}
.sidebar-pill-row,
.room-meta,
.composer-meta,
.participant-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.live-pill,
.room-badge,
.meta-pill,
.participant-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 0.76rem;
    font-weight: 700;
}
.live-pill.good,
.participant-pill.good {
    background: var(--success-soft);
    color: var(--success);
}
.live-pill.neutral,
.room-badge,
.meta-pill,
.participant-pill {
    background: rgba(255, 255, 255, 0.44);
}
[data-theme="dark"] .live-pill.neutral,
[data-theme="dark"] .room-badge,
[data-theme="dark"] .meta-pill,
[data-theme="dark"] .participant-pill {
    background: rgba(255, 255, 255, 0.04);
}
.live-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: currentColor;
    box-shadow: 0 0 0 0 currentColor;
    animation: pulse 1.8s ease infinite;
}
.sidebar-stats {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
}
.sidebar-card {
    display: grid;
    gap: 6px;
    padding: 16px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.56);
}
[data-theme="dark"] .sidebar-card {
    background: rgba(255, 255, 255, 0.03);
}
.sidebar-value {
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.85rem;
    font-weight: 800;
    line-height: 1;
}
.sidebar-section {
    display: grid;
    gap: 14px;
    min-height: 0;
}
.sidebar-section-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
}
.participant-list {
    display: grid;
    gap: 10px;
    overflow: auto;
    padding-right: 4px;
}
.participant-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.56);
}
[data-theme="dark"] .participant-row {
    background: rgba(255, 255, 255, 0.03);
}
.participant-copy {
    margin: 4px 0 0;
    font-size: 0.9rem;
    line-height: 1.5;
}
.sidebar-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.conversation-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--line);
    background:
        linear-gradient(180deg, rgba(18, 183, 213, 0.08), transparent 70%);
}
[data-theme="dark"] .conversation-header {
    background:
        linear-gradient(180deg, rgba(52, 214, 247, 0.1), transparent 70%);
}
.conversation-title {
    margin: 8px 0 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 0.96;
    letter-spacing: -0.05em;
}
.room-copy {
    margin: 12px 0 0;
    max-width: 640px;
    line-height: 1.7;
}
.conversation-tools {
    display: grid;
    gap: 10px;
    align-items: start;
    min-width: min(100%, 320px);
}
.search-shell {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px 0 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.62);
    min-height: 56px;

<body>
<div id="app"></div>
<script id="bootstrap-data" type="application/json">
{{ {
    "viewState": view_state,
    "canViewMessages": can_view_messages,
    "currentUser": current_user,
    "currentRole": current_role,
    "currentStatus": current_status,
    "restrictedState": restricted_state,
    "messages": messages
}|tojson }}
</script>
<script>
const e = React.createElement;
const { useEffect, useMemo, useRef, useState } = React;
const bootstrap = JSON.parse(document.getElementById("bootstrap-data").textContent || "{}");

let csrfToken = document.querySelector("meta[name='csrf-token']")?.content || "";

function cx() {
    return Array.from(arguments).filter(Boolean).join(" ");
}

function parseJson(response) {
    return response.json().catch(() => ({}));
}

async function refreshCsrfToken() {
    const response = await fetch("/csrf-token", {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok || !payload.csrf_token) {
        throw new Error(payload.message || "Could not refresh the secure form token");
    }
    csrfToken = payload.csrf_token;
    const meta = document.querySelector("meta[name='csrf-token']");
    if (meta) {
        meta.setAttribute("content", csrfToken);
    }
    return csrfToken;
}

async function postForm(url, data, retryOnCsrf = true) {
    const body = new URLSearchParams();
    Object.entries(Object.assign({}, data, { csrf_token: csrfToken })).forEach(([key, value]) => {
        body.append(key, value ?? "");
    });

    const response = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            "X-CSRFToken": csrfToken,
            "X-CSRF-Token": csrfToken
        },
        body
    });

    const payload = await parseJson(response);
    if (!response.ok) {
        if (retryOnCsrf && response.status === 400 && payload.csrf_refresh_required) {
            await refreshCsrfToken();
            return postForm(url, data, false);
        }
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

function Button(props) {
    const {
        children,
        variant = "primary",
        loading = false,
        className = "",
        ...rest
    } = props;
    return e(
        "button",
        Object.assign({}, rest, {
            className: cx(
                "button",
                variant === "primary" ? "button-primary" : variant === "secondary" ? "button-secondary" : "button-quiet",
                className
            )
        }),
        loading ? e("span", { className: "spinner", "aria-hidden": "true" }) : null,
        children
    );
}

function ThemeToggle({ theme, onToggle }) {
    return e(
        Button,
        {
            id: "themeBtn",
            type: "button",
            variant: "secondary",
            onClick: onToggle
        },
        theme === "dark" ? "Light" : "Dark"
    );
}

function EyeIcon({ visible }) {
    return e(
        "svg",
        {
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: "1.8",
            strokeLinecap: "round",
            strokeLinejoin: "round",
            width: "20",
            height: "20",
            "aria-hidden": "true"
        },
        visible
            ? [
                e("path", { key: "a", d: "M2 12s3.7-6 10-6 10 6 10 6-3.7 6-10 6-10-6-10-6Z" }),
                e("circle", { key: "b", cx: "12", cy: "12", r: "3" })
            ]
            : [
                e("path", { key: "c", d: "M3 3l18 18" }),
                e("path", { key: "d", d: "M10.6 6.3A10.7 10.7 0 0 1 12 6c6.3 0 10 6 10 6a17.6 17.6 0 0 1-3.4 4" }),
                e("path", { key: "e", d: "M6 7.1C3.8 8.9 2 12 2 12s3.7 6 10 6c1.2 0 2.2-.2 3.2-.5" })
            ]
    );
}

function formatMessageTime(value) {
    if (!value || String(value).toLowerCase() === "just now") {
        return "now";
    }
    const normalized = String(value).replace(" ", "T");
    const date = new Date(normalized);
    if (Number.isNaN(date.getTime())) {
        return value;
    }
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

function normalizeMessages(records) {
    return (records || []).slice().reverse();
}

function toMessageDate(value) {
    if (!value || String(value).toLowerCase() === "just now") {
        return new Date();
    }
    const normalized = String(value).replace(" ", "T");
    const date = new Date(normalized);
    if (Number.isNaN(date.getTime())) {
        return null;
    }
    return date;
}

function getDayKey(value) {
    const date = toMessageDate(value);
    if (!date) {
        return `unknown-${value || "empty"}`;
    }
    return `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
}

function formatDayLabel(value) {
    const date = toMessageDate(value);
    if (!date) {
        return "Recent activity";
    }

    const today = new Date();
    const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const messageDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diff = Math.round((startOfToday - messageDay) / 86400000);

    if (diff === 0) {
        return "Today";
    }
    if (diff === 1) {
        return "Yesterday";
    }

    return date.toLocaleDateString([], {
        month: "short",
        day: "numeric",
        year: today.getFullYear() === date.getFullYear() ? undefined : "numeric"
    });
}

function formatParticipantTime(value) {
    const date = toMessageDate(value);
    if (!date) {
        return "No activity yet";
    }

    return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
    });
}

function getInitial(name) {
    const trimmed = (name || "?").trim();
    return trimmed ? trimmed.slice(0, 1).toUpperCase() : "?";
}

function shortenMessage(value, limit = 56) {
    const text = (value || "").trim();
    if (!text) {
        return "No recent message";
    }
    if (text.length <= limit) {
        return text;
    }
    return `${text.slice(0, limit - 1)}...`;
}

function buildTimeline(messages, currentUser) {
    const timeline = [];
    let lastDayKey = "";
    let previousMessage = null;

    (messages || []).forEach((message, index) => {
        const dayKey = getDayKey(message.created_at);
        if (dayKey !== lastDayKey) {
            timeline.push({
                type: "divider",
                key: `divider-${dayKey}-${index}`,
                label: formatDayLabel(message.created_at)
            });
            lastDayKey = dayKey;
            previousMessage = null;
        }

        const previousName = (previousMessage?.username || "").toLowerCase();
        const currentName = (message.username || "").toLowerCase();
        const compact = previousMessage && previousName === currentName;

        timeline.push({
            type: "message",
            key: `${currentName || "member"}-${message.created_at || "now"}-${index}`,
            compact: Boolean(compact),
            mine: currentName === (currentUser || "").toLowerCase(),
            message
        });

        previousMessage = message;
    });

    return timeline;
}

function buildParticipants(messages, currentUser) {
    const map = new Map();

    (messages || []).forEach((message) => {
        const username = message.username || "Member";
        const key = username.toLowerCase();
        map.set(key, {
            username,
            mine: key === (currentUser || "").toLowerCase(),
            preview: shortenMessage(message.message),
            created_at: message.created_at
        });
    });

    if (currentUser && !map.has(currentUser.toLowerCase())) {
        map.set(currentUser.toLowerCase(), {
            username: currentUser,
            mine: true,
            preview: "No recent message",
            created_at: null
        });
    }

    return Array.from(map.values()).sort((left, right) => {
        if (left.mine !== right.mine) {
            return left.mine ? -1 : 1;
        }
        const leftTime = toMessageDate(left.created_at)?.getTime() || 0;
        const rightTime = toMessageDate(right.created_at)?.getTime() || 0;
        return rightTime - leftTime;
    });
}

function HeroPanel({ viewState }) {
    const detail = viewState === "chat"
        ? "The secure room is live for active member accounts, while admin controls remain isolated."
        : viewState === "restricted"

            : "Sentinel separates authentication, moderation, and live messaging so teams can collaborate without giving admins message visibility.";
    return e(

        { className: "surface hero" },
        e("div", { className: "eyebrow" }, "Private collaboration"),
        e("h1", null, "Messaging with a real ", e("span", { className: "accent-text" }, "permission boundary"), "."),
        e("p", { className: "hero-copy" }, detail),
        e("div", { className: "hero-grid" },
            e("article", { className: "metric-card" },
                e("div", { className: "metric-label" }, "Routing"),
                e("div", { className: "metric-value" }, viewState === "chat" ? "Live" : viewState === "restricted" ? "Restricted" : "Auth"),
                e("div", { className: "metric-copy" }, "The landing route resolves to login, restricted, or chat based on the current session.")
            ),
            e("article", { className: "metric-card" },
                e("div", { className: "metric-label" }, "Realtime"),
                e("div", { className: "metric-value" }, "Socket.IO"),
                e("div", { className: "metric-copy" }, "Connected members get live messages and admins receive presence updates without touching the chat stream.")
            ),
            e("article", { className: "metric-card" },
                e("div", { className: "metric-label" }, "Persistence"),
                e("div", { className: "metric-value" }, "MySQL"),
                e("div", { className: "metric-copy" }, "Role, status, online state, and last seen are backed by the database for deployable behavior.")
            )
        )
    );
}

function AuthPanel({ setBanner }) {
    const [mode, setMode] = useState("login");
    const [username, setUsername] = useState("");
    const [email, setEmail] = useState("");
    const [password, setPassword] = useState("");
    const [passwordVisible, setPasswordVisible] = useState(false);
    const [busy, setBusy] = useState(false);
    const [feedback, setFeedback] = useState({ tone: "", message: "" });

    function validate() {
        if (!username.trim()) {
            return "Username is required.";
        }
        if (mode === "register" && !email.trim()) {
            return "Email is required.";
        }
        if (!password) {
            return "Password is required.";
        }
        if (mode === "register" && password.length < 8) {
            return "Password must be at least 8 characters.";
        }
        return "";
    }

    async function handleSubmit(event) {
        event.preventDefault();
        const validationError = validate();
        if (validationError) {
            setFeedback({ tone: "error", message: validationError });
            setBanner({ tone: "error", message: validationError });
            return;
        }

        try {
            setBusy(true);
            setFeedback({ tone: "", message: "" });
            setBanner({ tone: "neutral", message: mode === "login" ? "Checking your secure session..." : "Creating your workspace access..." });

            if (mode === "register") {
                const payload = await postForm("/register", {
                    username: username.trim(),
                    email: email.trim(),
                    password
                });
                setPassword("");
                setPasswordVisible(false);
                setMode("login");
                setFeedback({ tone: "success", message: payload.message + ". Sign in to continue." });
                setBanner({ tone: "good", message: payload.message + ". Sign in to continue." });
                return;
            }

            const payload = await postForm("/login", {
                username: username.trim(),
                password
            });
            setBanner({ tone: "good", message: "Login successful. Opening your workspace..." });
            window.location.href = payload.redirect_to || (payload.can_manage_members ? "/admin" : "/");
        } catch (error) {
            const message = error.message || "Authentication failed.";
            setFeedback({ tone: "error", message });
            setBanner({ tone: "error", message });
        } finally {
            setBusy(false);
        }
    }

    return e(
        "section",
        { className: "surface panel", id: "auth-panel" },
        e("p", { className: "panel-label" }, "Workspace access"),
        e("h2", { className: "panel-title" }, "Sign in or create a member account."),
        e("p", { className: "panel-copy" }, "Members enter the live workspace. Admins are routed into a separate moderation console after authentication."),
        e("div", { className: "segmented", style: { marginTop: "24px" } },
            e("button", {
                id: "loginModeBtn",
                type: "button",
                className: mode === "login" ? "active" : "",
                onClick: () => {
                    setMode("login");
                    setFeedback({ tone: "", message: "" });
                }
            }, "Login"),
            e("button", {
                id: "registerModeBtn",
                type: "button",
                className: mode === "register" ? "active" : "",
                onClick: () => {
                    setMode("register");
                    setFeedback({ tone: "", message: "" });
                }
            }, "Register")
        ),
        e(
            "form",
            {
                id: "authForm",
                method: "POST",
                action: mode === "register" ? "/register" : "/login",
                onSubmit: handleSubmit,
                className: "stack"
            },
            e("label", { className: "field", htmlFor: "username" },
                e("span", { className: "field-label" }, "Username"),
                e("input", {
                    id: "username",
                    name: "username",
                    className: "input",
                    autoComplete: "username",
                    value: username,
                    onChange: (event) => setUsername(event.target.value),
                    placeholder: "Enter your username"
                })
            ),
            mode === "register"
                ? e("label", { className: "field", htmlFor: "email" },
                    e("span", { className: "field-label" }, "Email"),
                    e("input", {
                        id: "email",
                        name: "email",
                        type: "email",
                        className: "input",
                        autoComplete: "email",
                        value: email,
                        onChange: (event) => setEmail(event.target.value),
                        placeholder: "team@example.com"
                    })
                )
                : null,
            e("label", { className: "field", htmlFor: "password" },
                e("span", { className: "field-label" }, "Password"),
                e("div", { className: "input-shell" },
                    e("input", {
                        id: "password",
                        name: "password",
                        type: passwordVisible ? "text" : "password",
                        className: "input",
                        autoComplete: mode === "register" ? "new-password" : "current-password",
                        value: password,
                        onChange: (event) => setPassword(event.target.value),
                        placeholder: "Enter your password",
                        style: password ? { paddingRight: "56px" } : null
                    }),
                    password
                        ? e("button", {
                            id: "passwordToggle",
                            type: "button",
                            className: "password-toggle",
                            "aria-label": passwordVisible ? "Hide password" : "Show password",
                            onClick: () => setPasswordVisible((current) => !current)
                        }, e(EyeIcon, { visible: passwordVisible }))
                        : null
                )
            ),
            feedback.message
                ? e("div", {
                    className: cx("inline-alert", feedback.tone === "error" ? "error" : "success"),
                    role: "alert"
                }, feedback.message)
                : null,
            e("div", { className: "form-meta" },
                e("span", { className: "helper-text" }, mode === "register" ? "New accounts start as active members." : "Press Enter to submit securely."),
                e(Button, {
                    id: "submitAuthBtn",
                    type: "submit",
                    loading: busy,
                    disabled: busy
                }, busy ? "Working..." : mode === "register" ? "Create Account" : "Enter Workspace")
            )
        ),
        e("ul", { className: "security-list" },
            e("li", null, e("span", { className: "dot" }), e("span", null, "Only active member sessions can load the realtime chat workspace.")),
            e("li", null, e("span", { className: "dot" }), e("span", null, "Admins authenticate normally but stay inside an access-control console.")),
            e("li", null, e("span", { className: "dot" }), e("span", null, "Form requests are CSRF-protected and the client refreshes secure tokens automatically."))
        )
    );
}

function RestrictedPanel({ state, onLogout }) {
    return e(
        "section",
        { className: "surface panel" },
        e("p", { className: "panel-label" }, state.eyebrow || "Restricted route"),
        e("h2", { className: "panel-title" }, state.title || "Access is restricted."),
        e("p", { className: "panel-copy" }, state.message || "This route is unavailable for the current session."),
        e("ul", { className: "restriction-list" },
            e("li", null, e("span", { className: "dot" }), e("span", null, "Member chat is only rendered for active member sessions.")),
            e("li", null, e("span", { className: "dot" }), e("span", null, "Admin tools stay separated from the message stream.")),
            e("li", null, e("span", { className: "dot" }), e("span", null, "Banned sessions are invalidated and removed from realtime access immediately."))
        ),
        e("div", { className: "restriction-actions" },
            state.action_href
                ? e("a", { href: state.action_href, className: "action-link" }, state.action_label || "Open")
                : null,
            e(Button, {
                id: "logoutBtn",
                type: "button",
                variant: "secondary",
                onClick: onLogout
            }, "Logout")
        )
    );
}

function SidebarStat({ label, value, copy }) {
    return e(
        "article",
        { className: "sidebar-card" },
        e("div", { className: "sidebar-label" }, label),
        e("div", { className: "sidebar-value" }, value),
        e("div", { className: "sidebar-copy" }, copy)
    );
}

function ParticipantRow({ participant }) {
    return e(
        "article",
        { className: "participant-row" },
        e("div", { className: "participant-avatar", "aria-hidden": "true" }, getInitial(participant.username)),
        e("div", { style: { minWidth: 0, flex: "1 1 auto" } },
            e("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px", flexWrap: "wrap" } },
                e("h3", { className: "participant-name" }, participant.username),
                e("div", { className: "participant-meta" },
                    participant.mine ? e("span", { className: "participant-pill good" }, "You") : null,
                    e("span", { className: "participant-pill" }, formatParticipantTime(participant.created_at))
                )
            ),
            e("p", { className: "participant-copy" }, participant.preview)
        )
    );
}

function MessageRow({ message, mine, compact }) {
    const avatarNode = compact
        ? e("div", { key: "spacer", className: "message-avatar-spacer", "aria-hidden": "true" })
        : e("div", { key: "avatar", className: "message-avatar", "aria-hidden": "true" }, getInitial(message.username));

    const contentNode = e(
        "div",
        { key: "content", className: "message-content" },
        e("div", { className: "message-card" },
            e("div", { className: "message-bubble-head" },
                e("span", { className: "message-user" }, mine ? "You" : message.username || "Member"),
                e("span", { className: "message-time" }, formatMessageTime(message.created_at))
            ),
            e("p", { className: "message-text" }, message.message || "")
        )
    );

    return e(
        "article",
        { className: cx("message-row", mine && "mine", compact && "compact") },
        e(
            "div",
            { className: "message-cluster" },
            mine ? [contentNode, avatarNode] : [avatarNode, contentNode]
        )
    );
}

function ChatWorkspace({ initialMessages, currentUser, banner, setBanner, onLogout, onAccessRevoked, theme, onThemeToggle }) {
    const [messages, setMessages] = useState(normalizeMessages(initialMessages));
    const [query, setQuery] = useState("");
    const [draft, setDraft] = useState("");
    const [busy, setBusy] = useState(false);
    const [typingUser, setTypingUser] = useState("");
    const [connectionState, setConnectionState] = useState("connecting");
    const socketRef = useRef(null);
    const typingTimer = useRef(null);
    const localTypingTimer = useRef(null);
    const messageListRef = useRef(null);
    const accessRevokedRef = useRef(onAccessRevoked);

    useEffect(() => {
        accessRevokedRef.current = onAccessRevoked;
    }, [onAccessRevoked]);

    const filteredMessages = useMemo(() => {
        const needle = query.trim().toLowerCase();
        if (!needle) {
            return messages;
        }
        return messages.filter((entry) => {
            const haystack = `${entry.username || ""} ${entry.message || ""}`.toLowerCase();
            return haystack.includes(needle);
        });
    }, [messages, query]);

    const timeline = useMemo(() => buildTimeline(filteredMessages, currentUser), [filteredMessages, currentUser]);
    const participants = useMemo(() => buildParticipants(messages, currentUser), [messages, currentUser]);
    const searchSummary = query.trim()
        ? `${filteredMessages.length} result${filteredMessages.length === 1 ? "" : "s"} in this room`
        : `${messages.length} synced message${messages.length === 1 ? "" : "s"} ready to browse`;
    const connectionLabel = connectionState === "live"
        ? "Live sync"
        : connectionState === "reconnecting"
            ? "Reconnecting"
            : connectionState === "offline"
                ? "Offline"
                : "Connecting";
    const connectionTone = connectionState === "live" ? "good" : "neutral";

    useEffect(() => {
        if (!window.io) {
            return undefined;
        }
        const socket = window.io({ transports: ["websocket", "polling"] });
        socketRef.current = socket;

        socket.on("connect", () => {
            setConnectionState("live");
            setBanner({ tone: "good", message: "Realtime workspace connected." });
        });
        socket.on("system", (payload) => {
            setConnectionState("live");
            setBanner({ tone: "good", message: payload?.message || "Connected to real-time server." });
        });
        socket.on("connect_error", () => {
            setConnectionState("reconnecting");
            setBanner({ tone: "error", message: "Realtime connection is retrying." });
        });
        socket.on("new_message", (payload) => {
            setMessages((current) => current.concat(payload));
        });
        socket.on("typing", (payload) => {
            if (!payload?.active) {
                setTypingUser("");
                return;
            }
            setTypingUser(payload.username || "A teammate");
            window.clearTimeout(typingTimer.current);
            typingTimer.current = window.setTimeout(() => setTypingUser(""), 1600);
        });
        socket.on("access_revoked", (payload) => {
            const message = payload?.message || "Your access has been revoked.";
            accessRevokedRef.current(message);
            socket.disconnect();
        });
        socket.on("disconnect", () => {
            setConnectionState("offline");
            setBanner({ tone: "neutral", message: "Realtime channel disconnected." });
        });

        return () => {
            window.clearTimeout(typingTimer.current);
            window.clearTimeout(localTypingTimer.current);
            socket.disconnect();
            socketRef.current = null;
        };
    }, [setBanner]);

    useEffect(() => {
        const node = messageListRef.current;
        if (node) {
            node.scrollTop = node.scrollHeight;
        }
    }, [filteredMessages, typingUser]);

    function emitTyping(active) {
        const socket = socketRef.current;
        if (socket && socket.connected) {
            socket.emit("typing", { active: Boolean(active) });
        }
    }

    function handleDraftChange(nextValue) {
        setDraft(nextValue);
        emitTyping(Boolean(nextValue.trim()));
        window.clearTimeout(localTypingTimer.current);
        localTypingTimer.current = window.setTimeout(() => emitTyping(false), 900);
    }

    async function submit(event) {
        if (event) {
            event.preventDefault();
        }
        const message = draft.trim();
        if (!message) {
            setBanner({ tone: "error", message: "Enter a message before sending." });
            return;
        }

        try {
            setBusy(true);
            await postForm("/submit", { new_message: message });
            setDraft("");
            emitTyping(false);
            setBanner({ tone: "good", message: "Message sent to connected members." });
        } catch (error) {
            const messageText = error.message || "Message delivery failed.";
            if (messageText.toLowerCase().includes("banned")) {
                onAccessRevoked(messageText);
                return;
            }
            setBanner({ tone: "error", message: messageText });
        } finally {
            setBusy(false);
        }
    }

    return e(
        "div",
        { className: "chat-frame" },
        e("aside", { className: "surface chat-sidebar" },
            e("div", { className: "chat-brand" },
                e("div", { className: "brand-mark" }, "S"),
                e("div", { className: "chat-brand-copy" },
                    e("span", { className: "chat-kicker" }, "Member workspace"),
                    e("h1", { className: "chat-sidebar-title" }, "Sentinel Access"),
                    e("span", { className: "chat-sidebar-copy" }, "Private messaging channel")
                )
            ),
            e("section", { className: "chat-user-card" },
                e("div", { className: "chat-user-head" },
                    e("div", { className: "avatar-badge", "aria-hidden": "true" }, getInitial(currentUser)),
                    e("div", null,
                        e("h2", { className: "chat-user-name" }, currentUser || "Member"),
                        e("p", { className: "chat-user-copy" }, "Authenticated member session with realtime access enabled.")
                    )
                ),
                e("div", { className: "sidebar-pill-row" },
                    e("span", { className: `live-pill ${connectionTone}` },
                        e("span", { className: "live-dot", "aria-hidden": "true" }),
                        connectionLabel
                    ),
                    e("span", { className: "live-pill neutral" }, "Room: General")
                )
            ),
            e("section", { className: "sidebar-stats" },
                e(SidebarStat, {
                    label: "Loaded",
                    value: messages.length,
                    copy: "Recent messages in sync"
                }),
                e(SidebarStat, {
                    label: "People",
                    value: participants.length,
                    copy: "Unique senders in view"
                }),
                e(SidebarStat, {
                    label: "Search",
                    value: query.trim() ? filteredMessages.length : "Ready",
                    copy: query.trim() ? "Matches in current room" : "Search is idle"
                }),
                e(SidebarStat, {
                    label: "Composer",
                    value: draft.length,
                    copy: "Characters in draft"
                })
            ),
            e("section", { className: "sidebar-section" },
                e("div", { className: "sidebar-section-head" },
                    e("div", null,
                        e("div", { className: "sidebar-label" }, "Recent senders"),
                        e("div", { className: "sidebar-copy", style: { marginTop: "6px" } }, "Built from the real synced conversation history.")
                    )
                ),
                e("div", { className: "participant-list" },
                    participants.length
                        ? participants.map((participant) => e(ParticipantRow, {
                            key: `${participant.username}-${participant.created_at || "empty"}`,
                            participant
                        }))
                        : e("div", { className: "sidebar-copy" }, "Participants will appear here once the room has activity.")
                )
            ),
            e("div", { className: "sidebar-actions" },
                e(ThemeToggle, {
                    theme,
                    onToggle: onThemeToggle
                }),
                e(Button, {
                    id: "logoutBtn",
                    type: "button",
                    variant: "secondary",
                    onClick: onLogout
                }, "Logout")
            )
        ),
        e("section", { className: "surface chat-stage" },
            e("div", { className: "conversation-header" },
                e("div", null,
                    e("div", { className: "conversation-kicker" }, "Member workspace"),
                    e("h2", { className: "conversation-title" }, "Realtime room for active members."),
                    e("p", { className: "room-copy" }, "A focused secure channel with searchable history, realtime delivery, and a composer built for fast day-to-day updates."),
                    e("div", { className: "room-meta", style: { marginTop: "16px" } },
                        e("span", { className: "room-badge" }, "# general"),
                        e("span", { className: "room-badge" }, `${participants.length} participant${participants.length === 1 ? "" : "s"}`),
                        e("span", { className: "room-badge" }, `${messages.length} message${messages.length === 1 ? "" : "s"}`)
                    )
                ),
                e("div", { className: "conversation-tools" },
                    e("div", { className: "search-shell" },
                        e("input", {
                            id: "messageSearch",
                            className: "search-input",
                            value: query,
                            onChange: (event) => setQuery(event.target.value),
                            placeholder: "Search messages or usernames"
                        }),
                        query.trim()
                            ? e(Button, {
                                type: "button",
                                variant: "quiet",
                                onClick: () => setQuery("")
                            }, "Clear")
                            : null
                    ),
                    e("div", { className: "search-summary" }, searchSummary)
                )
            ),
            banner?.message
                ? e("div", {
                    className: cx("status-banner conversation-banner", banner.tone === "good" ? "good" : banner.tone === "error" ? "error" : "neutral")
                }, banner.message)
                : null,
            e("div", { id: "messages", ref: messageListRef, className: "messages" },
                timeline.length
                    ? timeline.map((item) => {
                        if (item.type === "divider") {
                            return e("div", { key: item.key, className: "date-divider" }, item.label);
                        }
                        return e(MessageRow, {
                            key: item.key,
                            message: item.message,
                            mine: item.mine,
                            compact: item.compact
                        });
                    })
                    : e("div", { className: "chat-empty-state" },
                        e("div", { className: "empty-icon", "aria-hidden": "true" }, "#"),
                        e("h3", { style: { margin: 0, fontFamily: "\"Cabinet Grotesk\", sans-serif", fontSize: "1.6rem" } },
                            query.trim() ? "No messages match this search." : "The room is ready for the first secure update."
                        ),
                        e("p", { className: "empty-state", style: { margin: 0, maxWidth: "420px", lineHeight: 1.7 } },
                            query.trim()
                                ? "Try a different keyword or clear the search to return to the full room history."
                                : "Start the conversation from the composer below. New messages will appear here in realtime for connected members."
                        )
                    )
            ),
            e("div", { className: "typing-strip" },
                typingUser
                    ? e("div", { id: "typingIndicator", className: "typing-pill" },
                        e("span", { className: "typing-dots", "aria-hidden": "true" },
                            e("span", null),
                            e("span", null),
                            e("span", null)
                        ),
                        `${typingUser} is typing...`
                    )
                    : e("div", { id: "typingIndicator", className: "typing-indicator" }, "")
            ),
            e("div", { className: "composer" },
                e("form", { className: "composer-form", onSubmit: submit },
                    e("div", { className: "composer-card" },
                        e("div", { className: "composer-toolbar" },
                            e("div", null,
                                e("div", { className: "composer-label" }, "Write a secure update"),
                                e("div", { className: "composer-hint", style: { marginTop: "6px" } }, "Enter sends. Shift+Enter creates a new line.")
                            ),
                            e("div", { className: "composer-meta" },
                                e("span", { className: "meta-pill" }, connectionLabel),
                                e("span", { className: "meta-pill" }, `${draft.length}/500`)
                            )
                        ),
                        e("textarea", {
                            id: "msgInput",
                            className: "composer-textarea",
                            value: draft,
                            maxLength: 500,
                            onChange: (event) => handleDraftChange(event.target.value),
                            onBlur: () => emitTyping(false),
                            onKeyDown: (event) => {
                                if (event.key === "Enter" && !event.shiftKey) {
                                    event.preventDefault();
                                    submit(event);
                                }
                            },
                            placeholder: "Share an update, decision, or handoff note"
                        }),
                        e("div", { className: "composer-footer" },
                            e("div", { className: "composer-actions" },
                                e("span", { className: "composer-count" }, query.trim() ? `${filteredMessages.length} filtered result${filteredMessages.length === 1 ? "" : "s"} visible` : "Latest room history is visible above")
                            ),
                            e(Button, {
                                id: "sendBtn",
                                type: "submit",
                                loading: busy,
                                disabled: busy || !draft.trim()
                            }, busy ? "Sending..." : "Send message")
                        )
                    )
                )
            )
        )
    );
}

function App() {
    const [theme, setTheme] = useState(localStorage.getItem("sentinel-theme") || "light");
    const [banner, setBanner] = useState(() => {
        if (bootstrap.viewState === "chat") {
            return { tone: "neutral", message: "Member workspace ready." };
        }
        if (bootstrap.viewState === "restricted") {
            return { tone: "neutral", message: bootstrap.restrictedState?.message || "This route is restricted." };
        }
        return { tone: "neutral", message: "Authenticate to enter the secure workspace." };
    });
    const [viewState, setViewState] = useState(bootstrap.viewState || "auth");
    const [restrictedState, setRestrictedState] = useState(bootstrap.restrictedState || {});

    useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("sentinel-theme", theme);
    }, [theme]);

    async function logout() {
        try {
            await postForm("/logout", {});
            window.location.href = "/";
        } catch (error) {
            setBanner({ tone: "error", message: error.message || "Logout failed." });
        }
    }

    function handleAccessRevoked(message) {
        setRestrictedState({
            eyebrow: "Access revoked",
            title: "Your member session has been closed.",
            message: message || "This account can no longer open the message stream.",
            action_label: "",
            action_href: ""
        });
        setViewState("restricted");
        setBanner({ tone: "error", message: "Access revoked. The member stream is now locked." });
    }

    if (viewState === "chat") {
        return e(
            "main",
            { className: "shell shell-chat" },
            e(ChatWorkspace, {
                initialMessages: bootstrap.messages || [],
                currentUser: bootstrap.currentUser || "",
                banner,
                setBanner,
                onLogout: logout,
                onAccessRevoked: handleAccessRevoked,
                theme,
                onThemeToggle: () => setTheme((current) => current === "dark" ? "light" : "dark")
            })
        );
    }

    return e(
        "main",
        { className: "shell" },
        e("header", { className: "topbar" },
            e("div", { className: "brand" },
                e("div", { className: "brand-mark" }, "S"),
                e("div", { className: "brand-meta" },
                    e("h1", { className: "brand-title" }, "Sentinel Access"),
                    e("strong", null, "Secure messaging workspace")
                )
            ),
            e("div", { className: "topbar-actions" },
                bootstrap.currentUser
                    ? e("span", { className: "chip chip-neutral" }, `${bootstrap.currentUser} / ${bootstrap.currentRole}`)
                    : e("span", { className: "chip chip-neutral" }, "Guest session"),
                e(ThemeToggle, {
                    theme,
                    onToggle: () => setTheme((current) => current === "dark" ? "light" : "dark")
                })
            )
        ),
        e("section", { className: "layout" },
            e(HeroPanel, { viewState }),
            viewState === "restricted"
                ? e(RestrictedPanel, {
                    state: restrictedState,
                    onLogout: logout
                })
                : e(AuthPanel, { setBanner })
        ),
        e("div", { className: cx("status-banner", banner.tone === "good" ? "good" : banner.tone === "error" ? "error" : "neutral") }, banner.message)
    );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
</body>
</html>
