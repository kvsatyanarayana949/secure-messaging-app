const motionSource = (window.Motion && window.Motion.motion) || (window.framerMotion && window.framerMotion.motion);
const hasMotion = Boolean(motionSource);
const Motion = {
    div: hasMotion ? motionSource.div : "div",
    article: hasMotion ? motionSource.article : "article",
    section: hasMotion ? motionSource.section : "section",
    button: hasMotion ? motionSource.button : "button"

let csrfToken = document.querySelector("meta[name='csrf-token']")?.content || "";

function cx(...classes) {
    return classes.filter(Boolean).join(" ");
}

async function parseJson(response) {
    try {
        return await response.json();
    } catch (_error) {
        return {};
    }
}

async function refreshCsrfToken() {
    const response = await fetch("/csrf-token", {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok || !payload.csrf_token) {
        throw new Error(payload.message || "Could not refresh the secure form token");
    }
    csrfToken = payload.csrf_token;
    const meta = document.querySelector("meta[name='csrf-token']");
    if (meta) {
        meta.setAttribute("content", csrfToken);
    }
    return csrfToken;
}

async function postForm(url, data = {}, retryOnCsrf = true) {
    const body = new URLSearchParams();
    Object.entries({ ...data, csrf_token: csrfToken }).forEach(([key, value]) => {
        body.append(key, value ?? "");
    });

    const response = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            "X-CSRFToken": csrfToken,
            "X-CSRF-Token": csrfToken
        },
        body
    });

    const payload = await parseJson(response);
    if (!response.ok) {
        if (retryOnCsrf && response.status === 400 && payload.csrf_refresh_required) {
            await refreshCsrfToken();
            return postForm(url, data, false);
        }
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

function Field({ id, label, type = "text", value, onChange, autoComplete, hidden = false }) {
    if (hidden) {
        return null;
    }
    const isPasswordField = type === "password";

    const inputType = isPasswordField && passwordVisible ? "text" : type;
    return e(
        "label",
        { className: "group relative block" },
        e("input", {
            id,
            type: inputType,
            value,
            onChange: (event) => onChange(event.target.value),
            autoComplete,
            placeholder: " ",
            className: cx(

        isPasswordField
            ? e(

                    id: `${id}Toggle`,
                    type: "button",
                    "aria-label": passwordVisible ? "Hide password" : "Show password",
                    "aria-pressed": passwordVisible,
                    onClick: () => setPasswordVisible((current) => !current),

function Avatar({ username, size = "md" }) {

function parseMessageDate(value) {
    if (!value || String(value).toLowerCase() === "just now") {
        return new Date();
    }
    const normalized = String(value).replace(" ", "T");
    const parsed = new Date(normalized);
    return Number.isNaN(parsed.getTime()) ? new Date() : parsed;
}

function isSameDay(left, right) {
    return left.getFullYear() === right.getFullYear()
        && left.getMonth() === right.getMonth()
        && left.getDate() === right.getDate();
}

function formatMessageTime(value) {
    if (!value || String(value).toLowerCase() === "just now") {
        return "now";
    }
    return parseMessageDate(value).toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit",
    });
}

function formatDateDivider(date) {
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);
    if (isSameDay(date, today)) {
        return "Today";
    }
    if (isSameDay(date, yesterday)) {
        return "Yesterday";
    }
    return date.toLocaleDateString([], {
        month: "short",
        day: "numeric",
        year: "numeric",
    });
}

function createMessageKey(entry, index = 0) {
    return `${entry.username || "member"}::${entry.created_at || "now"}::${entry.message || ""}::${index}`;
}

function normalizeMessages(records) {
    return [...(records || [])].reverse().map((entry, index) => ({
        ...entry,
        _clientId: createMessageKey(entry, index),
    }));
}

function hydrateLiveMessage(entry) {
    return {
        ...entry,
        _clientId: `live-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    };
}

function buildConversation(messages, currentUser, query) {
    const memberName = (currentUser || "").trim().toLowerCase();
    const needle = (query || "").trim().toLowerCase();
    const filtered = messages
        .filter((entry) => {
            const haystack = `${entry.username || ""} ${entry.message || ""}`.toLowerCase();
            return !needle || haystack.includes(needle);
        })
        .map((entry) => ({
            ...entry,
            isMine: Boolean(memberName) && (entry.username || "").toLowerCase() === memberName,
        }));

    const rows = [];
    filtered.forEach((entry, index) => {
        const previous = filtered[index - 1];
        const next = filtered[index + 1];
        const currentDate = parseMessageDate(entry.created_at);
        const startsDateGroup = !previous || !isSameDay(currentDate, parseMessageDate(previous.created_at));
        const sameAsPrevious = previous && previous.username === entry.username && isSameDay(currentDate, parseMessageDate(previous.created_at));
        const sameAsNext = next && next.username === entry.username && isSameDay(currentDate, parseMessageDate(next.created_at));

        if (startsDateGroup) {
            rows.push({
                type: "day",
                id: `day-${currentDate.toDateString()}-${index}`,
                label: formatDateDivider(currentDate),
            });
        }

        rows.push({
            type: "message",
            id: entry._clientId || createMessageKey(entry, index),
            entry,
            isMine: entry.isMine,
            startsCluster: !sameAsPrevious,
            endsCluster: !sameAsNext,
            showAvatar: !entry.isMine && !sameAsPrevious,
        });
    });

    return {
        rows,
        filtered,
    };
}

function ChatBubble({ row, showDelivery, reaction, onReact }) {
    const { entry, isMine, startsCluster, showAvatar } = row;
    const bubbleShape = isMine
        ? "rounded-[22px] rounded-br-[8px]"
        : "rounded-[22px] rounded-bl-[8px]";
    const bubbleTone = isMine
        ? "bg-[#2563eb] text-white shadow-[0_18px_42px_rgba(37,99,235,.34)] hover:bg-[#1d4ed8]"
        : "bg-[#1e293b] text-slate-100 shadow-[0_18px_42px_rgba(2,6,23,.45)] hover:bg-[#273449]";

    return e(
        Motion.article,
        {
            ...motionProps({ initial: { opacity: 0, y: 12 }, animate: { opacity: 1, y: 0 }, transition: { duration: .2 } }),
            className: cx("message-pop group flex w-full gap-3", isMine ? "justify-end" : "justify-start")
        },
        !isMine
            ? (
                showAvatar
                    ? e(Avatar, { username: entry.username, size: "sm" })
                    : e("div", { className: "w-9 shrink-0" })
            )
            : null,
        e("div", { className: cx("flex max-w-[70%] flex-col gap-1", isMine ? "items-end" : "items-start") },
            !isMine && startsCluster
                ? e("div", { className: "px-1 text-xs font-black uppercase tracking-[.16em] text-slate-400" }, entry.username)
                : null,
            e(
                "button",
                {
                    type: "button",
                    onClick: () => onReact(row.id),
                    className: cx(
                        "w-full text-left transition-all duration-200",
                        isMine ? "self-end" : "self-start"
                    )
                },
                e("div", { className: cx("px-4 py-3.5", bubbleShape, bubbleTone) },
                    e("p", { className: "break-words text-[15px] leading-6 text-inherit" }, entry.message),
                    e("div", { className: cx("mt-2 flex items-center gap-2 text-[11px] font-medium", isMine ? "justify-end text-white/70" : "justify-start text-slate-400") },
                        e("span", null, formatMessageTime(entry.created_at)),
                        isMine && showDelivery ? e("span", { className: "font-bold text-white/80" }, showDelivery) : null
                    )
                )
            ),
            reaction
                ? e("div", { className: cx("rounded-full border border-white/12 bg-white/6 px-2.5 py-1 text-xs font-bold text-white/90 transition", isMine ? "mr-1" : "ml-1") }, `${reaction} 1`)
                : null
        )
    );
}

function ProductPreview({ messages, isMember, currentUser, query, setQuery, onSend, onTyping, onActionStatus, typingUser }) {
    const [draft, setDraft] = useState("");
    const [busy, setBusy] = useState(false);
    const [reactions, setReactions] = useState({});
    const deferredQuery = useDeferredValue(query);
    const textareaRef = useRef(null);
    const scrollRef = useRef(null);
    const stickToBottom = useRef(true);
    const typingStopTimer = useRef(null);

    const conversation = useMemo(() => buildConversation(messages, currentUser, deferredQuery), [messages, currentUser, deferredQuery]);
    const lastMineMessage = [...conversation.filtered].reverse().find((entry) => entry.isMine);
    const lastMessage = conversation.filtered[conversation.filtered.length - 1];
    const deliveryTargetId = lastMineMessage?._clientId || null;
    const deliveryLabel = deliveryTargetId ? (lastMessage && lastMessage.isMine ? "Seen" : "Delivered") : "";
    const onlineCount = Math.max(2, new Set(messages.map((entry) => entry.username).filter(Boolean)).size);

    function resizeComposer() {
        const textarea = textareaRef.current;
        if (!textarea) {
            return;
        }
        textarea.style.height = "0px";
        textarea.style.height = `${Math.min(textarea.scrollHeight, 144)}px`;
    }

    function scheduleTypingStop(nextValue) {
        window.clearTimeout(typingStopTimer.current);
        if (!nextValue.trim()) {
            onTyping(false);
            return;
        }
        onTyping(true);
        typingStopTimer.current = window.setTimeout(() => onTyping(false), 1200);
    }

    function updateDraft(nextValue) {
        setDraft(nextValue);
        window.requestAnimationFrame(resizeComposer);
        scheduleTypingStop(nextValue);
    }

    async function submit() {
        const trimmed = draft.trim();
        if (!trimmed) {
            onActionStatus({ tone: "danger", message: "Write a message before sending." });
            return;
        }
        try {
            setBusy(true);
            await onSend(trimmed);
            setDraft("");
            onTyping(false);
            window.clearTimeout(typingStopTimer.current);
            window.requestAnimationFrame(() => {
                resizeComposer();
                textareaRef.current?.focus();
            });
        } finally {
            setBusy(false);
        }
    }

    function toggleReaction(messageId) {
        setReactions((current) => {
            if (current[messageId]) {
                const next = { ...current };
                delete next[messageId];
                return next;
            }
            return { ...current, [messageId]: "👍" };
        });
    }

    function handleAttach() {
        onActionStatus({ tone: "neutral", message: "Attachment uploads are the next enhancement for this chat." });
    }

    function handleEmoji() {
        const nextDraft = `${draft}${draft ? " " : ""}😊`;
        setDraft(nextDraft);
        window.requestAnimationFrame(() => {
            resizeComposer();
            textareaRef.current?.focus();
        });
        scheduleTypingStop(nextDraft);
    }

    function handleScroll() {
        const scroller = scrollRef.current;
        if (!scroller) {
            return;
        }
        stickToBottom.current = (scroller.scrollHeight - scroller.scrollTop - scroller.clientHeight) < 120;
    }

    useEffect(() => {
        resizeComposer();
    }, [draft]);

    useEffect(() => {
        const scroller = scrollRef.current;
        if (!scroller) {
            return;
        }
        window.requestAnimationFrame(() => {
            scroller.scrollTop = scroller.scrollHeight;
        });
    }, [isMember]);

    useEffect(() => {
        const scroller = scrollRef.current;
        if (!scroller) {
            return;
        }
        if (!stickToBottom.current) {
            return;
        }
        window.requestAnimationFrame(() => {
            scroller.scrollTo({
                top: scroller.scrollHeight,
                behavior: "smooth",
            });
        });
    }, [conversation.rows.length, typingUser]);

    useEffect(() => {
        return () => {
            window.clearTimeout(typingStopTimer.current);
        };

}

function AuthPanel({ setStatus }) {
    const [mode, setMode] = useState("login");
    const [username, setUsername] = useState("");
    const [email, setEmail] = useState("");
    const [password, setPassword] = useState("");
    const [busy, setBusy] = useState(false);

    async function handleAuth() {
        try {
            setBusy(true);
            setStatus({ tone: "neutral", message: mode === "login" ? "Checking secure session..." : "Creating member account..." });
            if (mode === "register") {
                const result = await postForm("/register", { username, email, password });
                setStatus({ tone: "good", message: `${result.message}. You can sign in now.` });
                setMode("login");
                return;
            }

            const result = await postForm("/login", { username, password });
            setStatus({ tone: "good", message: "Login successful. Opening your workspace..." });
            window.location.href = result.can_manage_members ? "/admin" : "/";
        } catch (error) {
            setStatus({ tone: "danger", message: error.message || "Authentication failed" });
        } finally {
            setBusy(false);
        }
    }

    return e(
        Motion.div,
        {
            ...motionProps({ initial: { opacity: 0, y: 24 }, animate: { opacity: 1, y: 0 }, transition: { duration: .55, delay: .08 } }),
            id: "auth-panel",
            className: "glass relative overflow-hidden rounded-[2.2rem] p-5 sm:p-6"
        },
        e("div", { className: "orb -right-10 -top-10 h-32 w-32 bg-pulse/30" }),
        e("div", { className: "relative" },
            e("div", { className: "mb-5 flex rounded-full border border-[var(--line)] bg-white/40 p-1 dark:bg-white/8" },
                e("button", {
                    id: "loginModeBtn",
                    type: "button",
                    onClick: () => setMode("login"),
                    className: cx("h-12 flex-1 rounded-full text-sm font-black transition", mode === "login" ? "bg-pulse text-ink shadow-glow" : "text-[var(--muted)]")
                }, "Login"),
                e("button", {
                    id: "registerModeBtn",
                    type: "button",
                    onClick: () => setMode("register"),
                    className: cx("h-12 flex-1 rounded-full text-sm font-black transition", mode === "register" ? "bg-pulse text-ink shadow-glow" : "text-[var(--muted)]")
                }, "Register")
            ),
            e("div", { className: "space-y-4" },
                e(Field, { id: "username", label: "Username", value: username, onChange: setUsername, autoComplete: "username" }),
                e(Field, { id: "email", label: "Email", type: "email", value: email, onChange: setEmail, autoComplete: "email", hidden: mode !== "register" }),
                e(Field, { id: "password", label: "Password", type: "password", value: password, onChange: setPassword, autoComplete: mode === "register" ? "new-password" : "current-password" })
            ),
            e(Button, {
                id: "submitAuthBtn",
                type: "button",
                onClick: handleAuth,
                disabled: busy,
                className: "mt-5 w-full"
            }, busy ? "Working..." : mode === "register" ? "Create Secure Account" : "Enter Workspace"),
            e("p", { className: "mt-4 text-center text-sm text-[var(--muted)]" }, "Fresh demo admin: admin / AdminPass123!")
        )
    );
}

function App() {
    const [theme, setThemeState] = useState(localStorage.getItem("sentinel-theme") || "dark");
    const [hasMemberAccess, setHasMemberAccess] = useState(Boolean(bootstrap.canViewMessages));
    const [status, setStatus] = useState({ tone: "neutral", message: bootstrap.canViewMessages ? "Real-time workspace ready." : "Message stream locked. Sign in with an active member account." });
    const [messages, setMessages] = useState(normalizeMessages(Array.isArray(bootstrap.messages) ? bootstrap.messages : []));
    const [query, setQuery] = useState("");
    const [typingUser, setTypingUser] = useState("");
    const socketRef = useRef(null);
    const typingTimer = useRef(null);
    const accessRevoked = useRef(false);
    const currentUser = bootstrap.currentUser || "";

    useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("sentinel-theme", theme);
    }, [theme]);

    useEffect(() => {
        if (!hasMemberAccess || !window.io) {
            return;
        }
        const socket = window.io({ autoConnect: true, transports: ["websocket", "polling"] });
        socketRef.current = socket;
        socket.on("connect", () => setStatus({ tone: "good", message: "Real-time channel connected." }));
        socket.on("system", (data) => setStatus({ tone: "good", message: data.message || "Connected to real-time server." }));
        socket.on("connect_error", () => setStatus({ tone: "danger", message: "Real-time channel is retrying." }));
        socket.on("access_revoked", (data) => {
            accessRevoked.current = true;
            setHasMemberAccess(false);
            setMessages([]);
            setQuery("");
            setTypingUser("");
            setStatus({ tone: "danger", message: data?.message || "Your access has been revoked." });
            socket.disconnect();
        });
        socket.on("disconnect", () => {
            if (accessRevoked.current) {
                setStatus({ tone: "danger", message: "Access revoked. The member stream is now locked." });
                return;
            }
            setStatus({ tone: "danger", message: "Real-time channel disconnected. Reconnecting..." });
        });
        socket.on("new_message", (entry) => {
            startTransition(() => {
                setMessages((current) => [...current, hydrateLiveMessage(entry)]);
            });
        });
        socket.on("typing", (data) => {
            if (!data?.active) {
                setTypingUser("");
                return;
            }
            setTypingUser(data.username || "A teammate");
            window.clearTimeout(typingTimer.current);
            typingTimer.current = window.setTimeout(() => setTypingUser(""), 1800);
        });
        return () => {
            socketRef.current = null;
            socket.disconnect();
        };
    }, [hasMemberAccess]);

    function emitTyping(active) {
        const socket = socketRef.current;
        if (socket && socket.connected) {
            socket.emit("typing", { active });
        }
    }

    async function sendMessage(message) {
        try {
            await postForm("/submit", { new_message: message });
            emitTyping(false);
            setStatus({ tone: "good", message: "Message sent to connected members." });
        } catch (error) {
            if ((error.message || "").toLowerCase().includes("banned")) {
                accessRevoked.current = true;
                setHasMemberAccess(false);
                setMessages([]);
                setQuery("");
                setTypingUser("");
            }
            setStatus({ tone: "danger", message: error.message || "Message failed." });
            throw error;
        }
    }

    async function logout() {
        try {
            await postForm("/logout");
            window.location.href = "/";
        } catch (error) {
            setStatus({ tone: "danger", message: error.message || "Logout failed." });
        }
    }

    const isMember = hasMemberAccess;
    const statusTone = status.tone === "good" ? "good" : status.tone === "danger" ? "danger" : "neutral";

    return e(
        "main",
        { className: "relative mx-auto min-h-screen w-full max-w-7xl px-4 py-5 sm:px-6 lg:px-8" },
        e("nav", { className: "relative z-10 flex items-center justify-between gap-4 py-3" },
            e("div", { className: "flex items-center gap-3" },
                e("div", { className: "grid h-12 w-12 place-items-center rounded-2xl bg-pulse font-display text-xl font-black text-ink shadow-glow" }, "S"),
                e("div", null,
                    e("div", { className: "font-display text-xl font-black" }, "Sentinel"),
                    e("div", { className: "text-xs font-black uppercase tracking-[.2em] text-[var(--muted)]" }, "Private team OS")
                )
            ),
            e("div", { className: "flex items-center gap-2" },
                e(StatusPill, { tone: isMember ? "good" : "neutral" }, isMember ? `${bootstrap.currentUser} / ${bootstrap.currentRole}` : "Guest"),
                e(Button, { id: "themeBtn", type: "button", variant: "secondary", onClick: () => setThemeState(theme === "dark" ? "light" : "dark"), className: "px-4" }, theme === "dark" ? "Light" : "Dark"),
                isMember ? e(Button, { id: "logoutBtn", type: "button", variant: "secondary", onClick: logout, className: "hidden px-4 sm:inline-flex" }, "Logout") : null
            )
        ),
        e(Motion.section, {
            ...motionProps({ initial: { opacity: 0, y: 24 }, animate: { opacity: 1, y: 0 }, transition: { duration: .6 } }),
            className: "grid gap-8 py-10 lg:grid-cols-[.92fr_1.08fr] lg:items-center lg:py-16"
        },
            e("div", { className: "relative" },
                e("div", { className: "mb-5 inline-flex rounded-full border border-pulse/30 bg-pulse/10 px-4 py-2 text-xs font-black uppercase tracking-[.2em] text-cyan-700 dark:text-cyan-200" }, "Role-safe messaging"),
                e("h1", { className: "max-w-4xl font-display text-5xl font-black leading-[.9] tracking-[-.06em] sm:text-7xl lg:text-8xl" },
                    "Secure chat that ",
                    e("span", { className: "gradient-text" }, "doesn't overtrust admins"),
                    "."
                ),
                e("p", { className: "mt-6 max-w-2xl text-lg leading-8 text-[var(--muted)] sm:text-xl" }, "Members collaborate in real time. Admins moderate access. Private messages stay private by design."),
                e("div", { className: "mt-8 flex flex-col gap-3 sm:flex-row" },
                    e(Button, {
                        type: "button",
                        onClick: () => document.getElementById(isMember ? "msgInput" : "auth-panel")?.scrollIntoView({ behavior: "smooth", block: "center" }),
                        className: "text-base"
                    }, isMember ? "Send A Live Update" : "Try Live Demo"),
                    e(Button, {
                        type: "button",
                        variant: "secondary",
                        onClick: () => document.getElementById("privacy-story")?.scrollIntoView({ behavior: "smooth", block: "center" }),
                        className: "text-base"
                    }, "View Privacy Model")
                ),
                e("div", { className: "mt-8 grid gap-3 sm:grid-cols-3" },
                    e(MetricCard, { label: "Boundary", value: isMember ? "Member" : "Split", detail: "Chat and moderation are separate." }),
                    e(MetricCard, { label: "Requests", value: "CSRF", detail: "Fresh-token recovery is built in." }),
                    e(MetricCard, { label: "Realtime", value: isMember ? "Live" : "Ready", detail: "Bottom-stacked chat keeps the latest message in focus." })
                )
            ),
            e("div", { className: "space-y-5" },
                isMember ? null : e(AuthPanel, { setStatus }),
                e(ProductPreview, {
                    messages,
                    isMember,
                    currentUser,
                    query,
                    setQuery,
                    onSend: sendMessage,
                    onTyping: emitTyping,
                    onActionStatus: setStatus,
                    typingUser,
                })
            )
        ),
        e("section", { id: "privacy-story", className: "grid gap-4 pb-14 md:grid-cols-3" },
            [
                ["01", "Moderation without surveillance", "Admins can ban, unban, and review members without entering the message stream. If a member is banned, chat access closes immediately."],
                ["02", "Fast recovery from stale sessions", "The client refreshes CSRF tokens automatically instead of failing silently."],
                ["03", "Designed for a real demo", "The interface leads with value, then proves it with live chat, search, status, and tests."]
            ].map(([number, title, body]) => e(
                Motion.div,
                {
                    key: number,
                    ...motionProps({ whileHover: { y: -6 } }),
                    className: "glass rounded-[2rem] p-6 transition"
                },
                e("div", { className: "mb-8 text-sm font-black text-pulse" }, number),
                e("h3", { className: "font-display text-2xl font-black" }, title),
                e("p", { className: "mt-3 leading-7 text-[var(--muted)]" }, body)
            ))
        ),
        e("div", { className: cx("fixed bottom-5 left-1/2 z-50 w-[min(92vw,42rem)] -translate-x-1/2 rounded-full border px-5 py-3 text-center text-sm font-bold shadow-soft backdrop-blur-xl", statusTone === "danger" ? "border-rose-400/30 bg-rose-500/15 text-rose-700 dark:text-rose-100" : statusTone === "good" ? "border-pulse/30 bg-pulse/15 text-cyan-900 dark:text-cyan-50" : "border-[var(--line)] bg-white/70 text-[var(--muted)] dark:bg-ink/80") }, status.message)
    );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
