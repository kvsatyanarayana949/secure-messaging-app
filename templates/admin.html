<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

<title>Sentinel Admin | Access Operations</title>

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
:root {
    color-scheme: light;
    --page: #f5f7f8;
    --surface: rgba(255, 255, 255, 0.9);
    --surface-strong: #ffffff;
    --text: #12202a;
    --muted: #60717b;
    --line: rgba(18, 32, 42, 0.12);
    --line-strong: rgba(18, 32, 42, 0.2);
    --accent: #12b7d5;
    --accent-strong: #0891b2;
    --accent-soft: rgba(18, 183, 213, 0.1);
    --danger: #dc2626;
    --danger-soft: rgba(220, 38, 38, 0.09);
    --success: #0f9d58;
    --success-soft: rgba(15, 157, 88, 0.1);
    --shadow-lg: 0 36px 100px rgba(17, 32, 43, 0.12);
    --shadow-md: 0 18px 44px rgba(17, 32, 43, 0.08);
}
[data-theme="dark"] {
    color-scheme: dark;
    --page: #071219;
    --surface: rgba(12, 24, 33, 0.86);
    --surface-strong: #0e1c25;
    --text: #f5fbff;
    --muted: #90a5b2;
    --line: rgba(191, 228, 240, 0.12);
    --line-strong: rgba(191, 228, 240, 0.22);
    --accent: #34d6f7;
    --accent-strong: #67e8f9;
    --accent-soft: rgba(52, 214, 247, 0.14);
    --danger: #fb7185;
    --danger-soft: rgba(251, 113, 133, 0.12);
    --success: #5eead4;
    --success-soft: rgba(94, 234, 212, 0.12);
    --shadow-lg: 0 40px 110px rgba(2, 6, 10, 0.45);
    --shadow-md: 0 22px 50px rgba(2, 6, 10, 0.28);
}
* {
    box-sizing: border-box;
}
html, body {
    margin: 0;
    min-height: 100%;
}
body {
    font-family: "Satoshi", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(18, 183, 213, 0.16), transparent 24rem),
        radial-gradient(circle at bottom right, rgba(8, 145, 178, 0.14), transparent 22rem),
        linear-gradient(180deg, #fbfcfc 0%, var(--page) 58%);
}
[data-theme="dark"] body {
    background:
        radial-gradient(circle at top left, rgba(52, 214, 247, 0.18), transparent 24rem),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.18), transparent 20rem),
        linear-gradient(180deg, #061017 0%, var(--page) 60%);
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(18, 32, 42, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 32, 42, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 92%);
}
.shell {
    position: relative;
    width: min(1180px, calc(100vw - 32px));
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 0 48px;
}
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
}
.brand {
    display: flex;
    align-items: center;
    gap: 16px;
}
.brand-mark {
    display: grid;
    place-items: center;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: #042431;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    box-shadow: 0 18px 38px rgba(18, 183, 213, 0.22);
}
.brand-title {
    margin: 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
}
.brand-subtitle,
.section-label,
.metric-label,
.chip,
.row-label,
.status-text {
    text-transform: uppercase;

}
.brand-subtitle {
    display: block;

    font-weight: 800;
}
.topbar-actions {
    display: flex;

}
.surface {

    border: 1px solid var(--line);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
}
.button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 16px;
    border: 1px solid transparent;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    text-decoration: none;
    transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}
.button:hover {
    transform: translateY(-1px);
}
.button:focus,
.metric-card:focus,
.input:focus,
.search-input:focus {

}
.button-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: #042431;
    box-shadow: 0 20px 38px rgba(18, 183, 213, 0.22);
}
.button-secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--line);
}
.button-danger {
    background: rgba(220, 38, 38, 0.1);
    color: var(--danger);
    border-color: rgba(220, 38, 38, 0.14);
}
.button-success {
    background: rgba(15, 157, 88, 0.1);
    color: var(--success);
    border-color: rgba(15, 157, 88, 0.14);
}
.button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
.spinner {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 2px solid rgba(4, 36, 49, 0.2);
    border-top-color: rgba(4, 36, 49, 0.82);
    animation: spin 0.85s linear infinite;
}
.layout {
    display: grid;
    gap: 28px;
}
.hero {
    display: grid;
    gap: 28px;
    grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
    align-items: start;
}
.intro,
.control-panel,
.board {
    padding: 28px;
}
.section-label {
    margin: 0;
    font-size: 0.74rem;
    font-weight: 800;
    color: var(--muted);
}
.intro-title,
.board-title {
    margin: 10px 0 0;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: clamp(2.2rem, 4vw, 3.6rem);
    line-height: 0.98;
    letter-spacing: -0.05em;
}
.accent-text {
    color: var(--accent-strong);
}
.intro-copy,
.status-copy,
.row-copy {
    color: var(--muted);
    line-height: 1.7;
}
.status-box {
    margin-top: 22px;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    font-size: 0.95rem;
}
.status-box.good {
    background: var(--success-soft);
    border-color: rgba(15, 157, 88, 0.18);
    color: var(--success);
}
.status-box.error {
    background: var(--danger-soft);
    border-color: rgba(220, 38, 38, 0.16);
    color: var(--danger);
}
.status-box.neutral {
    background: rgba(255, 255, 255, 0.22);
}
[data-theme="dark"] .status-box.neutral {
    background: rgba(255, 255, 255, 0.03);
}
.summary-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
}
.metric-card {
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.52);

}
[data-theme="dark"] .metric-card {

}
.metric-card.active {
    border-color: rgba(18, 183, 213, 0.26);

}
.metric-label {

}
.metric-value {
    margin-top: 14px;

    font-size: 2.4rem;
    font-weight: 800;
}
.metric-copy {
    margin-top: 8px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 0.94rem;
}
.controls-grid {
    display: grid;
    gap: 20px;

.input,
.search-input {
    width: 100%;
    min-height: 52px;
    padding: 0 16px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.66);
    color: var(--text);

    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}
[data-theme="dark"] .input,
[data-theme="dark"] .search-input {
    background: rgba(255, 255, 255, 0.04);
}
.control-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
}
.board-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
}
.board-title {
    font-size: 2.2rem;
}
.chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 0.72rem;
    font-weight: 800;
}
.chip-live {
    background: var(--success-soft);
    color: var(--success);
}
.board-tools {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.member-list {
    display: grid;
    gap: 14px;
    margin-top: 20px;
}
.member-row {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 1fr) auto;
    padding: 20px;
    border-radius: 22px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.54);
    box-shadow: var(--shadow-md);
}
[data-theme="dark"] .member-row {
    background: rgba(255, 255, 255, 0.03);
}
.row-head {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
}
.avatar {
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: #042431;
    font-family: "Cabinet Grotesk", sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
}
.row-name {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 800;
}
.row-copy {
    margin: 8px 0 0;
}
.row-tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 32px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 0.82rem;
    font-weight: 700;
}
.tag-danger {
    color: var(--danger);
    background: var(--danger-soft);
    border-color: rgba(220, 38, 38, 0.16);
}
.tag-success {
    color: var(--success);
    background: var(--success-soft);
    border-color: rgba(15, 157, 88, 0.16);
}
.row-meta {
    display: grid;
    gap: 8px;
}
.row-label {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
}
.row-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
}
.empty-state {
    margin-top: 20px;
    padding: 28px;
    border: 1px dashed var(--line-strong);
    border-radius: 22px;
    text-align: center;
    color: var(--muted);
}
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
@media (max-width: 1024px) {
    .hero,
    .controls-grid,
    .summary-grid {
        grid-template-columns: 1fr;
    }
}
@media (max-width: 640px) {
    .shell {
        width: min(100vw - 24px, 100%);
        padding-top: 16px;
    }
    .topbar,
    .board-header,
    .row-head,
    .row-actions,
    .control-actions,
    .topbar-actions {
        flex-direction: column;
        align-items: stretch;
    }
    .member-row {
        grid-template-columns: 1fr;
    }
    .intro,
    .control-panel,
    .board {
        padding: 22px;
    }
}
</style>
</head>
<body>
<div id="admin-app"></div>
<script id="bootstrap-data" type="application/json">
{{ {
    "currentUser": current_user,
    "currentRole": current_role,
    "members": members,
    "stats": stats
}|tojson }}
</script>
<script>
const e = React.createElement;
const { useEffect, useMemo, useRef, useState } = React;
const bootstrap = JSON.parse(document.getElementById("bootstrap-data").textContent || "{}");

let csrfToken = document.querySelector("meta[name='csrf-token']")?.content || "";

function cx() {
    return Array.from(arguments).filter(Boolean).join(" ");
}

function parseJson(response) {
    return response.json().catch(() => ({}));
}

async function refreshCsrfToken() {
    const response = await fetch("/csrf-token", {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok || !payload.csrf_token) {
        throw new Error(payload.message || "Could not refresh the secure form token");
    }
    csrfToken = payload.csrf_token;
    const meta = document.querySelector("meta[name='csrf-token']");
    if (meta) {
        meta.setAttribute("content", csrfToken);
    }
    return csrfToken;
}

async function getJson(url) {
    const response = await fetch(url, {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok) {
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

async function postForm(url, data, retryOnCsrf = true) {
    const body = new URLSearchParams();
    Object.entries(Object.assign({}, data, { csrf_token: csrfToken })).forEach(([key, value]) => {
        body.append(key, value ?? "");
    });

    const response = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            "X-CSRFToken": csrfToken,
            "X-CSRF-Token": csrfToken
        },
        body
    });
    const payload = await parseJson(response);
    if (!response.ok) {
        if (retryOnCsrf && response.status === 400 && payload.csrf_refresh_required) {
            await refreshCsrfToken();
            return postForm(url, data, false);
        }
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

function normalizeMember(record) {
    const role = (record.role || "member").toLowerCase() === "user" ? "member" : (record.role || "member").toLowerCase();
    const status = record.status ? record.status.toLowerCase() : (record.is_banned ? "banned" : "active");
    return Object.assign({}, record, {
        role,
        status,
        is_online: Boolean(record.is_online),
        is_banned: status === "banned"
    });
}

function sortMembers(records) {
    return (records || [])
        .map(normalizeMember)
        .sort((left, right) => {
            if (left.is_online !== right.is_online) {
                return left.is_online ? -1 : 1;
            }
            return String(left.username || "").localeCompare(String(right.username || ""));
        });
}

function computeStats(records) {
    const members = sortMembers(records);
    return {
        active_users: members.filter((record) => record.is_online).length,
        total_members: members.length,
        banned_users: members.filter((record) => record.status === "banned").length,
        offline_users: members.filter((record) => !record.is_online).length
    };
}

function Button(props) {
    const {
        children,
        variant = "primary",
        loading = false,
        className = "",
        ...rest
    } = props;
    return e(
        "button",
        Object.assign({}, rest, {
            className: cx(
                "button",
                variant === "primary"
                    ? "button-primary"
                    : variant === "danger"
                        ? "button-danger"
                        : variant === "success"
                            ? "button-success"
                            : "button-secondary",
                className
            )
        }),
        loading ? e("span", { className: "spinner", "aria-hidden": "true" }) : null,
        children
    );
}

function ThemeToggle({ theme, onToggle }) {
    return e(
        Button,
        {
            id: "themeBtn",
            type: "button",
            variant: "secondary",
            onClick: onToggle
        },
        theme === "dark" ? "Light" : "Dark"
    );
}

function formatLastSeen(record) {
    if (record.is_online) {
        return "Live now";
    }
    if (!record.last_seen) {
        return "No presence recorded";
    }
    const normalized = String(record.last_seen).replace(" ", "T");
    const date = new Date(normalized);
    if (Number.isNaN(date.getTime())) {
        return record.last_seen;
    }
    return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
    });
}

function MetricCard({ id, label, value, copy, active, onClick }) {
    return e(
        "button",
        {
            type: "button",
            className: cx("metric-card", active && "active"),
            onClick: () => onClick(id)
        },
        e("div", { className: "metric-label" }, label),
        e("div", { className: "metric-value" }, value),
        e("div", { className: "metric-copy" }, copy)
    );
}

function MemberRow({ record, busyKey, onModerate }) {
    const actionKey = `${record.status}:${record.username}`;
    const isAdmin = record.role === "admin";
    const onlineTone = record.is_online ? "tag-success" : "";
    const statusTone = record.status === "banned" ? "tag-danger" : "tag-success";
    return e(
        "article",
        { className: "member-row" },
        e("div", { className: "row-meta" },
            e("div", { className: "row-head" },
                e("div", { className: "avatar" }, (record.username || "?").slice(0, 1).toUpperCase()),
                e("div", null,
                    e("h3", { className: "row-name" }, record.username || "Unknown"),
                    e("p", { className: "row-copy" }, record.email || "No email available")
                )
            ),
            e("div", { className: "row-tags" },
                e("span", { className: "tag" }, record.role),
                e("span", { className: cx("tag", statusTone) }, record.status),
                e("span", { className: cx("tag", onlineTone) }, record.is_online ? "online" : "offline")
            ),
            e("div", { className: "row-copy" },
                e("strong", { className: "row-label" }, "Last seen"),
                e("div", { style: { marginTop: "6px" } }, formatLastSeen(record))
            )
        ),
        e("div", { className: "row-actions" },
            isAdmin
                ? e(Button, { type: "button", variant: "secondary", disabled: true }, "Protected")
                : record.status === "banned"
                    ? e(Button, {
                        type: "button",
                        variant: "success",
                        loading: busyKey === actionKey,
                        disabled: busyKey === actionKey,
                        onClick: () => onModerate("/unban_user", record.username)
                    }, "Unban User")
                    : e(Button, {
                        type: "button",
                        variant: "danger",
                        loading: busyKey === actionKey,
                        disabled: busyKey === actionKey,
                        onClick: () => onModerate("/ban_user", record.username)
                    }, "Ban User")
        )
    );
}

function AdminApp() {
    const [theme, setTheme] = useState(localStorage.getItem("sentinel-theme") || "light");
    const [members, setMembers] = useState(sortMembers(bootstrap.members || []));
    const [filter, setFilter] = useState("all");
    const [query, setQuery] = useState("");
    const [quickUsername, setQuickUsername] = useState("");
    const [busyKey, setBusyKey] = useState("");
    const [status, setStatus] = useState({ tone: "neutral", message: "Access operations console loaded. Presence sync is standing by." });
    const socketRef = useRef(null);

    useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("sentinel-theme", theme);
    }, [theme]);

    const stats = useMemo(() => computeStats(members), [members]);

    const filteredMembers = useMemo(() => {
        const needle = query.trim().toLowerCase();
        return members.filter((record) => {
            const matchesFilter = filter === "all"
                ? true
                : filter === "active"
                    ? record.is_online
                    : filter === "banned"
                        ? record.status === "banned"
                        : !record.is_online;
            if (!matchesFilter) {
                return false;
            }
            if (!needle) {
                return true;
            }
            return [record.username, record.email, record.role, record.status, record.is_online ? "online" : "offline"]
                .join(" ")
                .toLowerCase()
                .includes(needle);
        });
    }, [filter, members, query]);

    useEffect(() => {
        if (!window.io) {
            return undefined;
        }
        const socket = window.io({ transports: ["websocket", "polling"] });
        socketRef.current = socket;
        socket.on("system", (payload) => {
            setStatus({ tone: "good", message: payload?.message || "Connected to admin presence channel." });
        });
        socket.on("presence_update", (payload) => {
            setMembers((current) => {
                if (!current.some((record) => record.username === payload.username)) {
                    return current;
                }
                return sortMembers(current.map((record) => {
                    if (record.username !== payload.username) {
                        return record;
                    }
                    return Object.assign({}, record, {
                        role: payload.role || record.role,
                        status: payload.status || record.status,
                        is_online: Boolean(payload.is_online),
                        last_seen: payload.last_seen || record.last_seen,
                        is_banned: (payload.status || record.status) === "banned"
                    });
                }));
            });
        });
        socket.on("roster_refresh", () => {
            loadMembers(true);
        });
        socket.on("connect_error", () => {
            setStatus({ tone: "error", message: "Realtime presence sync is retrying." });
        });
        socket.on("disconnect", () => {
            setStatus({ tone: "neutral", message: "Presence sync disconnected." });
        });
        return () => {
            socket.disconnect();
            socketRef.current = null;
        };
    }, []);

    async function loadMembers(silent = false) {
        try {
            const payload = await getJson("/users");
            setMembers(sortMembers(payload.users || []));
            if (!silent) {
                setStatus({ tone: "good", message: "Member roster refreshed." });
            }
        } catch (error) {
            setStatus({ tone: "error", message: error.message || "Failed to load the member roster." });
        }
    }

    async function moderate(endpoint, username) {
        const trimmed = (username || "").trim();
        if (!trimmed) {
            setStatus({ tone: "error", message: "Enter a username before running moderation." });
            return;
        }

        const key = `${endpoint === "/ban_user" ? "active" : "banned"}:${trimmed}`;
        try {
            setBusyKey(key);
            await postForm(endpoint, { username: trimmed });
            setQuickUsername("");
            await loadMembers(true);
            setStatus({ tone: "good", message: `${trimmed} updated successfully.` });
        } catch (error) {
            setStatus({ tone: "error", message: error.message || "Moderation failed." });
        } finally {
            setBusyKey("");
        }
    }

    async function logout() {
        try {
            await postForm("/logout", {});
            window.location.href = "/";
        } catch (error) {
            setStatus({ tone: "error", message: error.message || "Logout failed." });
        }
    }

    return e(
        "main",
        { className: "shell" },
        e("header", { className: "topbar" },
            e("div", { className: "brand" },
                e("div", { className: "brand-mark" }, "S"),
                e("div", null,
                    e("h1", { className: "brand-title" }, "Sentinel Admin"),
                    e("span", { className: "brand-subtitle" }, "Access operations")
                )
            ),
            e("div", { className: "topbar-actions" },
                e("span", { className: "chip" }, `${bootstrap.currentUser} / ${bootstrap.currentRole}`),
                e(ThemeToggle, {
                    theme,
                    onToggle: () => setTheme((current) => current === "dark" ? "light" : "dark")
                }),
                e(Button, {
                    id: "logoutBtn",
                    type: "button",
                    variant: "secondary",
                    onClick: logout
                }, "Logout")
            )
        ),
        e("section", { className: "layout" },
            e("section", { className: "hero" },
                e("article", { className: "surface intro" },
                    e("p", { className: "section-label" }, "Moderation boundary"),
                    e("h2", { className: "intro-title" }, "Manage access, ", e("span", { className: "accent-text" }, "not conversations"), "."),
                    e("p", { className: "intro-copy" }, "This console shows live user presence and status from MySQL while keeping the member message stream out of admin hands."),
                    e("div", { className: cx("status-box", status.tone === "good" ? "good" : status.tone === "error" ? "error" : "neutral") }, status.message)
                ),
                e("article", { className: "surface control-panel" },
                    e("p", { className: "section-label" }, "Quick moderation"),
                    e("h3", { className: "board-title", style: { marginTop: "8px" } }, "Direct member actions"),
                    e("p", { className: "intro-copy", style: { marginTop: "12px" } }, "Use a username to run a single moderation action. The board below stays filtered on real roster data."),
                    e("div", { className: "controls-grid", style: { marginTop: "22px" } },
                        e("input", {
                            id: "quickUsername",
                            className: "input",
                            value: quickUsername,
                            onChange: (event) => setQuickUsername(event.target.value),
                            onKeyDown: (event) => {
                                if (event.key === "Enter") {
                                    event.preventDefault();
                                    moderate("/ban_user", quickUsername);
                                }
                            },
                            placeholder: "Enter username"
                        }),
                        e("div", { className: "control-actions" },
                            e(Button, {
                                id: "quickBanBtn",
                                type: "button",
                                variant: "danger",
                                loading: busyKey === `active:${quickUsername.trim()}`,
                                disabled: busyKey === `active:${quickUsername.trim()}`,
                                onClick: () => moderate("/ban_user", quickUsername)
                            }, "Ban User"),
                            e(Button, {
                                id: "quickUnbanBtn",
                                type: "button",
                                variant: "success",
                                loading: busyKey === `banned:${quickUsername.trim()}`,
                                disabled: busyKey === `banned:${quickUsername.trim()}`,
                                onClick: () => moderate("/unban_user", quickUsername)
                            }, "Unban User")
                        )
                    )
                )
            ),
            e("section", { className: "summary-grid" },
                e(MetricCard, {
                    id: "active",
                    label: "Active users",
                    value: stats.active_users,
                    copy: "Currently connected through Socket.IO.",
                    active: filter === "active",
                    onClick: setFilter
                }),
                e(MetricCard, {
                    id: "all",
                    label: "Total members",
                    value: stats.total_members,
                    copy: "All users returned by the roster query.",
                    active: filter === "all",
                    onClick: setFilter
                }),
                e(MetricCard, {
                    id: "banned",
                    label: "Banned users",
                    value: stats.banned_users,
                    copy: "Accounts blocked from entering the workspace.",
                    active: filter === "banned",
                    onClick: setFilter
                }),
                e(MetricCard, {
                    id: "offline",
                    label: "Offline users",
                    value: stats.offline_users,
                    copy: "Accounts not currently connected.",
                    active: filter === "offline",
                    onClick: setFilter
                })
            ),
            e("section", { className: "surface board" },
                e("div", { className: "board-header" },
                    e("div", null,
                        e("p", { className: "section-label" }, "Real roster"),
                        e("h2", { className: "board-title" }, "User presence and access board"),
                        e("p", { className: "intro-copy", style: { marginTop: "12px" } }, "Click a summary card to filter the list. Search narrows the visible roster without changing the underlying counts.")
                    ),
                    e("div", { className: "board-tools" },
                        e("span", { className: "chip chip-live" }, "Live presence"),
                        e("input", {
                            id: "searchInput",
                            className: "search-input",
                            value: query,
                            onChange: (event) => setQuery(event.target.value),
                            placeholder: "Search username, role, status"
                        }),
                        e(Button, {
                            id: "refreshBtn",
                            type: "button",
                            variant: "secondary",
                            onClick: () => loadMembers(false)
                        }, "Refresh")
                    )
                ),
                filteredMembers.length
                    ? e("div", { id: "memberList", className: "member-list" },
                        filteredMembers.map((record) => e(MemberRow, {
                            key: `${record.username}-${record.status}`,
                            record,
                            busyKey,
                            onModerate: moderate
                        }))
                    )
                    : e("div", { className: "empty-state" }, "No users match the current filter.")
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById("admin-app")).render(e(AdminApp));
</script>
</body>
</html>
