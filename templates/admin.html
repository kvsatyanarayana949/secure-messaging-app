<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel Admin | Access Operations</title>
<meta name="csrf-token" content="{{ csrf_token() }}">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: ["class", '[data-theme="dark"]'],
    theme: {
        extend: {
            colors: {
                ink: "#061018",
                steel: "#0d1b24",
                pulse: "#00e5ff"
            },
            fontFamily: {
                sans: ["Satoshi", "sans-serif"],
                display: ["Cabinet Grotesk", "sans-serif"]
            },
            boxShadow: {
                glow: "0 24px 90px rgba(0,229,255,.24)",
                soft: "0 30px 80px rgba(6,16,24,.18)"
            }
        }
    }
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root {
    color-scheme: light;
    --page: #eef5f6;
    --text: #071016;
    --muted: #567078;
    --card: rgba(255,255,255,.78);
    --line: rgba(7,16,22,.12);
    --beam: rgba(0,229,255,.34);
}
[data-theme="dark"] {
    color-scheme: dark;
    --page: #061018;
    --text: #eefbff;
    --muted: #8facb6;
    --card: rgba(12,26,35,.72);
    --line: rgba(196,244,255,.14);
    --beam: rgba(0,229,255,.24);
}
body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: "Satoshi", sans-serif;
    background:
        radial-gradient(circle at 5% 4%, var(--beam), transparent 24rem),
        radial-gradient(circle at 84% 18%, rgba(255,255,255,.08), transparent 20rem),
        linear-gradient(135deg, var(--page), color-mix(in srgb, var(--page) 88%, #00e5ff 12%));
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .24;
    background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(to bottom, #000, transparent 84%);
}
.glass {
    border: 1px solid var(--line);
    background: var(--card);
    backdrop-filter: blur(22px);
    box-shadow: 0 28px 86px rgba(6,16,24,.18);
}
.gradient-text {
    background: linear-gradient(120deg, var(--text), #00e5ff 48%, #8ef5ff 74%);
    -webkit-background-clip: text;
    color: transparent;
}
.focus-ring:focus {
    outline: none;
    box-shadow: 0 0 0 4px rgba(0,229,255,.22);
    border-color: rgba(0,229,255,.72);
}
</style>
</head>
<body>
<div id="admin-app"></div>
<script id="bootstrap-data" type="application/json">
{{ {
    "currentUser": current_user,
    "currentRole": current_role,
    "members": members,
    "stats": stats
}|tojson }}
</script>
<script>
const e = React.createElement;
const { useEffect, useMemo, useState } = React;
const bootstrap = JSON.parse(document.getElementById("bootstrap-data").textContent || "{}");
const motionSource = (window.Motion && window.Motion.motion) || (window.framerMotion && window.framerMotion.motion);
const hasMotion = Boolean(motionSource);
const Motion = {
    div: hasMotion ? motionSource.div : "div",
    article: hasMotion ? motionSource.article : "article",
    section: hasMotion ? motionSource.section : "section",
    button: hasMotion ? motionSource.button : "button"
};
const motionProps = (props) => hasMotion ? props : {};

let csrfToken = document.querySelector("meta[name='csrf-token']")?.content || "";

function cx(...classes) {
    return classes.filter(Boolean).join(" ");
}

async function parseJson(response) {
    try {
        return await response.json();
    } catch (_error) {
        return {};
    }
}

async function refreshCsrfToken() {
    const response = await fetch("/csrf-token", {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok || !payload.csrf_token) {
        throw new Error(payload.message || "Could not refresh the secure form token");
    }
    csrfToken = payload.csrf_token;
    const meta = document.querySelector("meta[name='csrf-token']");
    if (meta) {
        meta.setAttribute("content", csrfToken);
    }
    return csrfToken;
}

async function getJson(url) {
    const response = await fetch(url, {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json" }
    });
    const payload = await parseJson(response);
    if (!response.ok) {
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

async function postForm(url, data = {}, retryOnCsrf = true) {
    const body = new URLSearchParams();
    Object.entries({ ...data, csrf_token: csrfToken }).forEach(([key, value]) => {
        body.append(key, value ?? "");
    });

    const response = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            "X-CSRFToken": csrfToken,
            "X-CSRF-Token": csrfToken
        },
        body
    });
    const payload = await parseJson(response);
    if (!response.ok) {
        if (retryOnCsrf && response.status === 400 && payload.csrf_refresh_required) {
            await refreshCsrfToken();
            return postForm(url, data, false);
        }
        throw new Error(payload.message || "Request failed");
    }
    return payload;
}

function Button({ children, variant = "primary", className = "", ...props }) {
    const variants = {
        primary: "bg-pulse text-ink shadow-glow hover:bg-cyan-200",
        secondary: "bg-white/10 text-[var(--text)] ring-1 ring-[var(--line)] hover:bg-white/16",
        danger: "bg-rose-500 text-white shadow-[0_20px_70px_rgba(244,63,94,.22)] hover:bg-rose-400",
        quiet: "text-[var(--muted)] hover:text-[var(--text)]"
    };
    return e(
        Motion.button,
        {
            ...motionProps({ whileHover: { scale: 1.025, y: -1 }, whileTap: { scale: .98 } }),
            ...props,
            className: cx("inline-flex min-h-11 items-center justify-center rounded-full px-5 text-sm font-black transition duration-200 disabled:pointer-events-none disabled:opacity-55", variants[variant], className)
        },
        children
    );
}

function Status({ status }) {
    const tone = status.tone === "danger"
        ? "border-rose-400/30 bg-rose-500/15 text-rose-700 dark:text-rose-100"
        : status.tone === "good"
            ? "border-pulse/30 bg-pulse/15 text-cyan-900 dark:text-cyan-50"
            : "border-[var(--line)] bg-white/60 text-[var(--muted)] dark:bg-white/8";
    return e("div", { id: "statusBox", className: cx("rounded-2xl border px-4 py-3 text-sm font-bold", tone) }, status.message);
}

function Metric({ label, value, caption }) {
    return e(
        Motion.div,
        {
            ...motionProps({ initial: { opacity: 0, y: 18 }, animate: { opacity: 1, y: 0 }, transition: { duration: .42 } }),
            className: "glass rounded-[2rem] p-5"
        },
        e("p", { className: "text-xs font-black uppercase tracking-[.18em] text-[var(--muted)]" }, label),
        e("div", { className: "mt-3 font-display text-4xl font-black" }, value),
        e("p", { className: "mt-2 text-sm leading-6 text-[var(--muted)]" }, caption)
    );
}

function computeStats(records) {
    const total = records.length;
    const banned = records.filter((record) => record.is_banned).length;
    const admins = records.filter((record) => record.role === "admin").length;
    return { total, banned, admins, active: total - banned };
}

function MemberCard({ record, onModerate }) {
    const banned = Boolean(record.is_banned);
    const isAdmin = record.role === "admin";
    return e(
        Motion.article,
        {
            ...motionProps({ initial: { opacity: 0, y: 14 }, animate: { opacity: 1, y: 0 }, transition: { duration: .28 } }),
            className: "group grid gap-4 rounded-[1.7rem] border border-[var(--line)] bg-white/70 p-4 shadow-sm transition hover:-translate-y-1 hover:shadow-soft dark:bg-white/8 sm:grid-cols-[auto_1fr_auto] sm:items-center"
        },
        e("div", { className: cx("grid h-12 w-12 place-items-center rounded-2xl font-black text-ink shadow-glow", banned ? "bg-rose-300" : "bg-pulse") }, (record.username || "?").slice(0, 1).toUpperCase()),
        e("div", null,
            e("div", { className: "flex flex-wrap items-center gap-2" },
                e("h3", { className: "font-display text-xl font-black" }, record.username),
                e("span", { className: "rounded-full border border-[var(--line)] px-2 py-1 text-xs font-black uppercase tracking-[.14em] text-[var(--muted)]" }, record.role),
                e("span", { className: cx("rounded-full px-2 py-1 text-xs font-black uppercase tracking-[.14em]", banned ? "bg-rose-500/15 text-rose-500" : "bg-pulse/15 text-cyan-700 dark:text-cyan-200") }, banned ? "Banned" : "Active")
            ),
            e("p", { className: "mt-2 text-sm leading-6 text-[var(--muted)]" }, `${record.email || "no email"} | Last login: ${record.last_login_at || "Never"}`)
        ),
        e("div", { className: "flex gap-2 sm:justify-end" },
            isAdmin
                ? e(Button, { type: "button", variant: "secondary", disabled: true }, "Protected")
                : e(Button, {
                    type: "button",
                    className: "member-action",
                    variant: banned ? "primary" : "danger",
                    onClick: () => onModerate(banned ? "/unban_user" : "/ban_user", record.username)
                }, banned ? "Unban" : "Ban")
        )
    );
}

function AdminApp() {
    const [theme, setTheme] = useState(localStorage.getItem("sentinel-theme") || "dark");
    const [members, setMembers] = useState(Array.isArray(bootstrap.members) ? bootstrap.members : []);
    const [query, setQuery] = useState("");
    const [quickUsername, setQuickUsername] = useState("");
    const [busyAction, setBusyAction] = useState("");
    const [status, setStatus] = useState({ tone: "neutral", message: "Access operations console loaded. Private messages remain sealed." });

    useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("sentinel-theme", theme);
    }, [theme]);

    const filteredMembers = useMemo(() => {
        const needle = query.trim().toLowerCase();
        if (!needle) {
            return members;
        }
        return members.filter((record) => {
            return [record.username, record.email, record.role, record.is_banned ? "banned" : "active"].join(" ").toLowerCase().includes(needle);
        });
    }, [members, query]);

    const stats = computeStats(filteredMembers);

    async function loadMembers() {
        try {
            const payload = await getJson("/users");
            setMembers(payload.users || []);
            setStatus({ tone: "good", message: "Member roster refreshed." });
        } catch (error) {
            setStatus({ tone: "danger", message: error.message || "Failed to load members." });
        }
    }

    async function moderate(endpoint, username) {
        if (!username) {
            setStatus({ tone: "danger", message: "Enter a username before running moderation." });
            return;
        }
        try {
            setBusyAction(endpoint + username);
            await postForm(endpoint, { username });
            setQuickUsername("");
            await loadMembers();
            setStatus({ tone: "good", message: `${username} updated successfully.` });
        } catch (error) {
            setStatus({ tone: "danger", message: error.message || "Moderation failed." });
        } finally {
            setBusyAction("");
        }
    }

    async function logout() {
        try {
            await postForm("/logout");
            window.location.href = "/";
        } catch (error) {
            setStatus({ tone: "danger", message: error.message || "Logout failed." });
        }
    }

    return e(
        "main",
        { className: "relative mx-auto min-h-screen w-full max-w-7xl px-4 py-5 sm:px-6 lg:px-8" },
        e("nav", { className: "relative z-10 flex flex-wrap items-center justify-between gap-4 py-3" },
            e("div", { className: "flex items-center gap-3" },
                e("div", { className: "grid h-12 w-12 place-items-center rounded-2xl bg-pulse font-display text-xl font-black text-ink shadow-glow" }, "S"),
                e("div", null,
                    e("div", { className: "font-display text-xl font-black" }, "Sentinel Admin"),
                    e("div", { className: "text-xs font-black uppercase tracking-[.2em] text-[var(--muted)]" }, "Access operations")
                )
            ),
            e("div", { className: "flex items-center gap-2" },
                e("div", { className: "rounded-full border border-[var(--line)] bg-white/10 px-4 py-3 text-xs font-black uppercase tracking-[.16em] text-[var(--muted)]" }, `${bootstrap.currentUser} / ${bootstrap.currentRole}`),
                e(Button, { id: "themeBtn", type: "button", variant: "secondary", onClick: () => setTheme(theme === "dark" ? "light" : "dark"), className: "px-4" }, theme === "dark" ? "Light" : "Dark"),
                e(Button, { id: "logoutBtn", type: "button", variant: "secondary", onClick: logout, className: "px-4" }, "Logout")
            )
        ),
        e(Motion.section, {
            ...motionProps({ initial: { opacity: 0, y: 24 }, animate: { opacity: 1, y: 0 }, transition: { duration: .58 } }),
            className: "grid gap-6 py-10 lg:grid-cols-[.9fr_1.1fr] lg:items-start lg:py-14"
        },
            e("aside", { className: "space-y-5" },
                e("section", { className: "glass rounded-[2.4rem] p-6 sm:p-8" },
                    e("div", { className: "mb-5 inline-flex rounded-full border border-pulse/30 bg-pulse/10 px-4 py-2 text-xs font-black uppercase tracking-[.2em] text-cyan-700 dark:text-cyan-200" }, "No message visibility"),
                    e("h1", { className: "font-display text-5xl font-black leading-[.92] tracking-[-.055em] sm:text-6xl" },
                        "Moderate access, ",
                        e("span", { className: "gradient-text" }, "not conversations"),
                        "."
                    ),
                    e("p", { className: "mt-5 text-lg leading-8 text-[var(--muted)]" }, "The admin console is intentionally restrained. It manages member status without exposing the private communication layer."),
                    e("div", { className: "mt-6" }, e(Status, { status }))
                ),
                e("section", { className: "glass rounded-[2rem] p-5" },
                    e("h2", { className: "font-display text-2xl font-black" }, "Quick moderation"),
                    e("p", { className: "mt-2 text-sm leading-6 text-[var(--muted)]" }, "Use this for direct actions when you already know the username."),
                    e("input", {
                        id: "quickUsername",
                        value: quickUsername,
                        onChange: (event) => setQuickUsername(event.target.value),
                        onKeyDown: (event) => {
                            if (event.key === "Enter") {
                                moderate("/ban_user", quickUsername.trim());
                            }
                        },
                        placeholder: "Username",
                        className: "focus-ring mt-5 h-14 w-full rounded-full border border-[var(--line)] bg-white/70 px-5 font-bold text-slate-950 placeholder:text-slate-400 dark:bg-white/8 dark:text-white"
                    }),
                    e("div", { className: "mt-4 flex flex-col gap-3 sm:flex-row" },
                        e(Button, { id: "quickBanBtn", type: "button", variant: "danger", disabled: busyAction === "/ban_user" + quickUsername, onClick: () => moderate("/ban_user", quickUsername.trim()), className: "flex-1" }, "Ban User"),
                        e(Button, { id: "quickUnbanBtn", type: "button", disabled: busyAction === "/unban_user" + quickUsername, onClick: () => moderate("/unban_user", quickUsername.trim()), className: "flex-1" }, "Unban User")
                    )
                ),
                e("section", { className: "glass rounded-[2rem] p-5" },
                    e("h2", { className: "font-display text-2xl font-black" }, "Privacy policy"),
                    e("div", { className: "mt-4 grid gap-3" },
                        ["Admins cannot read messages", "Members own the chat workspace", "Moderation actions are auditable"].map((item) => e("div", { key: item, className: "rounded-2xl border border-[var(--line)] bg-white/40 p-4 text-sm font-bold text-[var(--muted)] dark:bg-white/8" }, item))
                    )
                )
            ),
            e("section", { className: "space-y-5" },
                e("div", { className: "grid gap-3 sm:grid-cols-2 xl:grid-cols-4" },
                    e(Metric, { label: "Total members", value: stats.total, caption: "Filtered by current roster view." }),
                    e(Metric, { label: "Active", value: stats.active, caption: "Eligible to enter member chat." }),
                    e(Metric, { label: "Banned", value: stats.banned, caption: "Blocked from authentication." }),
                    e(Metric, { label: "Admins", value: stats.admins, caption: "Protected operator accounts." })
                ),
                e("section", { className: "glass rounded-[2.4rem] p-4 sm:p-5" },
                    e("div", { className: "flex flex-col gap-4 border-b border-[var(--line)] pb-5 lg:flex-row lg:items-center lg:justify-between" },
                        e("div", null,
                            e("p", { className: "text-xs font-black uppercase tracking-[.18em] text-[var(--muted)]" }, "Member roster"),
                            e("h2", { className: "mt-1 font-display text-3xl font-black" }, "Access health board")
                        ),
                        e("div", { className: "flex flex-col gap-3 sm:flex-row" },
                            e("input", {
                                id: "searchInput",
                                value: query,
                                onChange: (event) => setQuery(event.target.value),
                                placeholder: "Search username, email, status",
                                className: "focus-ring h-12 rounded-full border border-[var(--line)] bg-white/70 px-5 font-bold text-slate-950 placeholder:text-slate-400 dark:bg-white/8 dark:text-white sm:w-72"
                            }),
                            e(Button, { id: "refreshBtn", type: "button", variant: "secondary", onClick: loadMembers }, "Refresh")
                        )
                    ),
                    e("div", { id: "memberList", className: "mt-5 grid max-h-[38rem] gap-3 overflow-auto pr-1" },
                        filteredMembers.length
                            ? filteredMembers.map((record) => e(MemberCard, { key: record.username, record, onModerate: moderate }))
                            : e("div", { className: "rounded-[1.8rem] border border-dashed border-[var(--line)] p-8 text-center text-[var(--muted)]" }, "No members match this search.")
                    )
                )
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById("admin-app")).render(e(AdminApp));
</script>
</body>
</html>
